  const clrs={30:P.KY,31:P.KR,32:P.KB,33:P.KG,34:P.KK};
  const op=(t===30&&doors.y)||(t===31&&doors.r)||(t===32&&doors.b)||(t===33&&doors.g)||(t===34&&doors.k);
  X.fillStyle='#221e16';X.fillRect(x+1,y+5,TS-2,TS-5);
  if(!op){X.fillStyle='#343028';X.fillRect(x+3,y+6,TS-6,TS-10);for(let i=6;i<TS-6;i+=4){X.fillStyle='rgba(0,0,0,0.06)';X.fillRect(x+3,y+i,TS-6,0.8)}X.fillStyle=clrs[t].replace('rgb','rgba').replace(')',','+(Math.sin(fc*0.08)*0.15+0.4)+')');X.fillRect(x+TS/2-4,y+TS/2-3,8,8);X.fillStyle='#100e0a';X.fillRect(x+TS/2-1,y+TS/2-4,2,6)}
  else{X.fillStyle=P.FLOOR;X.fillRect(x+3,y+6,TS-6,TS-10);X.fillStyle='#285828';X.fillRect(x+TS/2-3,y+TS/2-3,6,6)}
}
function rst(t,x,y){
  const cx=x+TS/2,cy=y+TS/2;
  X.fillStyle='#1a1814';X.fillRect(cx-7,cy-6,14,12);
  for(let i=0;i<4;i++){X.fillStyle='#2a2824';X.fillRect(cx-5,cy-4+i*3,10,1.5)}
  X.fillStyle='#3a3832';X.fillRect(cx-5,cy-6,10,1.5);
  if(t===Sd)X.fillStyle='#604828',X.fillRect(cx-3,cy+2,6,2),X.fillRect(cx-1,cy-2,2,6);
  if(t===Su)X.fillStyle='#604828',X.fillRect(cx-3,cy-4,6,2),X.fillRect(cx-1,cy-2,2,6);
}
function rv(x,y){const cx=x+TS/2,cy=y+TS/2;X.fillStyle='#0e0c08';X.fillRect(cx-5,cy-5,10,10);X.fillStyle='#1e1c18';X.fillRect(cx-4,cy-4,8,8);for(let i=0;i<4;i++){X.fillStyle='rgba(0,0,0,0.2)';X.fillRect(cx-3,cy-3+i*3,6,0.8)}X.fillStyle='rgba(80,160,120,'+(Math.sin(fc*0.04)*0.08+0.12)+')';X.fillRect(cx-6,cy-6,12,12)}
function re(x,y){const cx=x+TS/2,cy=y+TS/2,gl=Math.sin(fc*0.05)*0.15+0.2;X.fillStyle='#0c0a06';X.fillRect(x+3,y+3,TS-6,TS-6);X.fillStyle='rgba(20,100,50,'+gl+')';X.fillRect(x+5,y+5,TS-10,TS-10);X.fillStyle='rgba(255,255,255,'+(gl*0.7)+')';X.fillRect(cx-3,cy-3,6,6)}

// ═══════════ PLAYER ═══════════
function drawPlayer(){
  const px=(player.x+0.5)*TS-cam.x,py=(player.y+0.5)*TS-cam.y,s=TS*0.42;
  X.save();X.translate(px,py);
  const bob=player.isMoving?Math.sin(player.walkTimer*10)*1.5:0;
  X.fillStyle='rgba(0,0,0,0.35)';X.fillRect(-s*0.55,bob*0.5+2,s*1.1,s*0.22);
  X.fillStyle='#684820';X.fillRect(-s*0.26,-s*0.2+bob,s*0.52,s*0.44);
  X.fillStyle='#584018';X.fillRect(-s*0.2,-s*0.06+bob,s*0.4,s*0.18);
  X.fillStyle='#684820';X.fillRect(-s*0.44,-s*0.1+bob,s*0.88,s*0.2);
  X.fillStyle='#b08870';X.fillRect(-s*0.16,-s*0.52+bob,s*0.32,s*0.28);
  X.fillStyle='#201008';X.fillRect(-s*0.16,-s*0.52+bob,s*0.32,s*0.08);
  const armB=player.isMoving?Math.sin(player.walkTimer*10)*2:0;
  X.fillStyle='#684820';X.fillRect(-s*0.52,-s*0.02+bob+armB*0.5,s*0.12,s*0.28);X.fillRect(s*0.4,-s*0.02+bob-armB*0.5,s*0.12,s*0.28);
  X.fillStyle='#221e16';
  const legOff=player.isMoving?Math.sin(player.walkTimer*10)*3:0;
  X.fillRect(-s*0.16,s*0.24+bob+legOff,s*0.12,s*0.3);X.fillRect(s*0.04,s*0.24+bob-legOff,s*0.12,s*0.3);
  X.fillStyle='#0c0a06';X.fillRect(-s*0.2,s*0.5+bob+legOff,s*0.16,s*0.07);X.fillRect(s*0.04,s*0.5+bob-legOff,s*0.16,s*0.07);
  X.restore();
}

// ═══════════ GUARD ═══════════
function drawGuard(g){
  const gx=(g.x+0.5)*TS-cam.x,gy=(g.y+0.5)*TS-cam.y,s=TS*0.44;

  // Vision cone
  if(g.state!=='patrol'){
    X.save();X.translate(gx,gy);
    const vclr=g.state==='chase'?'rgba(255,40,10,0.06)':'rgba(255,180,50,0.04)';
    X.fillStyle=vclr;X.beginPath();X.moveTo(0,0);
    const va=g.visAngle/2,r=g.visRange*TS;
    X.arc(0,0,r,g.facing-va,g.facing+va);X.closePath();X.fill();
    X.strokeStyle=g.state==='chase'?'rgba(255,40,10,0.15)':'rgba(255,180,50,0.08)';
    X.lineWidth=0.8;X.stroke();X.restore();
  }

  X.save();X.translate(gx,gy);
  X.fillStyle='rgba(0,0,0,0.35)';X.fillRect(-s*0.55,2,s*1.1,s*0.22);
  X.fillStyle=g.ty==='elite'?'#100e24':'#10142c';X.fillRect(-s*0.28,-s*0.2,s*0.56,s*0.44);
  X.fillStyle=g.clr;X.fillRect(-s*0.22,-s*0.04,s*0.44,s*0.22);
  X.fillStyle='#0c1024';X.fillRect(-s*0.46,-s*0.1,s*0.92,s*0.18);
  X.fillStyle='#987058';X.fillRect(-s*0.16,-s*0.52,s*0.32,s*0.28);
  X.fillStyle=g.clr;X.fillRect(-s*0.16,-s*0.52,s*0.32,s*0.08);
  if(g.ty==='elite'){X.fillStyle='rgba(255,20,8,0.5)';X.fillRect(-0.06,-s*0.44,0.04,0.04);X.fillRect(0.02,-s*0.44,0.04,0.04)}
  X.fillStyle='#0c1024';X.fillRect(-s*0.52,-s*0.02,s*0.12,s*0.28);
  X.fillStyle=g.clr;X.fillRect(s*0.4,-s*0.02,s*0.48,s*0.08);X.fillStyle='#1c1814';X.fillRect(s*0.58,-s*0.04,s*0.06,s*0.12);
  X.fillStyle='#0c1024';X.fillRect(-s*0.16,s*0.24,s*0.12,s*0.3);X.fillRect(s*0.04,s*0.24,s*0.12,s*0.3);
  X.restore();

  if(g.state!=='patrol'){const lbl=g.state==='chase'?'!':g.state==='suspicious'?'?':'!!';const lc=g.state==='chase'?'#f44':g.state==='suspicious'?'#fc0':'#f80';X.fillStyle=lc;X.font='bold 9px monospace';X.textAlign='center';X.fillText(lbl,gx,gy-s*1.05)}
}

// ═══════════ MAIN DRAW ═══════════
function draw(){
  X.fillStyle='#020206';X.fillRect(0,0,C.width,C.height);

  const sc=Math.max(0,Math.floor(cam.x/TS)-1);
  const ec=Math.min(COLS,Math.ceil((cam.x+C.width)/TS)+1);
  const sr=Math.max(0,Math.floor(cam.y/TS)-2);
  const er=Math.min(MAP_FLOORS[currentFloor].length,Math.ceil((cam.y+C.height)/TS)+2);

  // Floors & objects first
  for(let r=sr;r<er;r++)for(let c=sc;c<ec;c++)if(map[r]){const t=map[r][c];if(!isWall(t)||t===Fe)rd(t,c*TS,r*TS,c,r)}
  // Walls on top
  for(let r=sr;r<er;r++)for(let c=sc;c<ec;c++)if(map[r]){const t=map[r][c];if(isWall(t)&&t!==Fe)rd(t,c*TS,r*TS,c,r)}

  // Dust particles
  dp(dust);

  // Light beams from lamps (diagonal warm rays)
  for(let r=sr;r<er;r++)for(let c=sc;c<ec;c++)if(map[r]){
    const t=map[r][c];
    if(t===Lm||t===Lf){
      const sx=c*TS-cam.x+TS/2,sy=r*TS-cam.y+TS/2;
      const alpha=t===Lf?(Math.sin(fc*0.14+c*3)*0.3+0.4)*0.012:0.008;
      X.fillStyle='rgba(200,170,110,'+alpha+')';
      X.beginPath();X.moveTo(sx,sy);
      X.lineTo(sx-20,sy+40);X.lineTo(sx-12,sy+40);X.closePath();X.fill();
      X.beginPath();X.moveTo(sx,sy);
      X.lineTo(sx+20,sy+40);X.lineTo(sx+12,sy+40);X.closePath();X.fill();
    }
  }

  if(!won&&!dead){for(const g of guards)drawGuard(g);drawPlayer()}
  dp(particles);

  // Alert vignette
  const anyAlert=guards.some(g=>g.state==='alert'||g.state==='chase');
  if(anyAlert){const aa=guards.some(g=>g.state==='chase')?0.12:0.04;X.fillStyle='rgba(255,20,5,'+aa+')';X.fillRect(0,0,C.width,C.height)}

  // Room-based atmosphere
  const rn=room(player.x,player.y);
  if(rn==='HIDDEN BIOLAB'||rn==='GENERATOR ROOM'){
    if(Math.sin(fc*0.08)>0.5)X.fillStyle='rgba(0,0,0,0.12)',X.fillRect(0,0,C.width,C.height);
    // Green ambient in biolab
    if(currentFloor===1&&player.y>=11)X.fillStyle='rgba(30,100,50,0.03)',X.fillRect(0,0,C.width,C.height);
  }

  // Vignette
  const grd=X.createRadialGradient(C.width/2,C.height*0.3,C.width*0.25,C.width/2,C.height*0.3,C.width*0.9);
  grd.addColorStop(0,'rgba(0,0,0,0)');grd.addColorStop(1,'rgba(0,0,0,0.75)');
  X.fillStyle=grd;X.fillRect(0,0,C.width,C.height);

  // Screen shake
  if(shk>0.5){const sx=(Math.random()-0.5)*shk,sy=(Math.random()-0.5)*shk;const img=X.getImageData(0,0,C.width,C.height);X.fillStyle='#020206';X.fillRect(0,0,C.width,C.height);X.putImageData(img,Math.round(sx),Math.round(sy))}

  if(won){
    X.fillStyle='rgba(0,0,0,0.88)';X.fillRect(0,0,C.width,C.height);
    X.fillStyle='#60a070';X.font='bold 36px Courier New,monospace';X.textAlign='center';
    X.fillText('FREEDOM',C.width/2,C.height/2-18);
  }
  if(dead){
    X.fillStyle='rgba(30,0,0,0.75)';X.fillRect(0,0,C.width,C.height);
    X.fillStyle='#a04040';X.font='bold 30px Courier New,monospace';X.textAlign='center';X.fillText('TERMINATED',C.width/2,C.height/2);
  }
  X.textAlign='start';
}

// ═══════════ LOOP ═══════════
function loop(){
  fc++;
  if(!won&&!dead){updateAll();checkCol();}
  uc();if(shk>0)shk*=0.85;
  up(particles);up(dust);draw();

  const kc=(keys.y?1:0)+(keys.r?1:0)+(keys.b?1:0)+(keys.g?1:0)+(keys.k?1:0);
  document.getElementById('keys').textContent=kc+'/5';
  document.getElementById('roomName').textContent=room(player.x,player.y);
  document.getElementById('steps').textContent=steps;
  document.getElementById('floor').textContent=currentFloor===0?'🟫 F1':'⬇ B1';
  document.getElementById('floor').style.color=currentFloor===0?'#a08040':'#6080a0';

  const anyChase=guards.some(g=>g.state==='chase');
  const anyAlert=guards.some(g=>g.state==='alert');
  const near=guards.some(g=>Math.sqrt((player.x-g.x)**2+(player.y-g.y)**2)<4);
  const th=document.getElementById('threat');
  th.textContent=anyChase?'🚨 HUNTING':near?'⚠ HIGH':anyAlert?'👁 ALERT':'⚡ LOW';
  th.style.color=anyChase?'#f44':near?'#f80':anyAlert?'#fc0':'#608060';

  requestAnimationFrame(loop);
}

function updateAll(){
  for(const g of guards)updateGuardAI(g);
  sd();
  if(player.isMoving)player.walkTimer+=0.16;
}
function checkCol(){
  for(const g of guards){
    const dx=player.x-g.x,dy=player.y-g.y;
    if(Math.sqrt(dx*dx+dy*dy)<(g.ty==='elite'?0.7:0.5)){dead=true;sp(player.x,player.y,'#883030',45,7);shk=15;document.getElementById('msg').innerHTML='💀 CAUGHT! Press R'}
  }
}

// ═══════════ MOVEMENT ═══════════
function move(dx,dy){
  if(won||dead)return;
  const nx=player.x+dx,ny=player.y+dy;
  if(nx<0||ny<0||nx>=COLS||ny>=MAP_FLOORS[currentFloor].length)return;
  const t=gt(nx,ny);
  if(!wk(t)&&!isDr(t)&&t!==Ex)return;
  player.isMoving=true;
  if(dx!==0)player.facing=dx>0?2:3;
  if(dy!==0)player.facing=dy>0?0:1;

  // Stairs
  if(t===Sd||t===Su){
    currentFloor=t===Sd?1:0;
    rmap();sg();
    if(t===Sd){player.x=22;player.y=2;cam.x=0;cam.y=0}
    else{player.x=21;player.y=13;cam.x=0;cam.y=0}
    document.getElementById('msg').innerHTML=t===Sd?'⬇ Descending to BASEMENT...':'⬆ Ascending to GROUND FLOOR...';
    player.isMoving=false;steps++;return;
  }

  if(t===Vt){player.x=nx;player.y=ny;steps++;player.isMoving=false;return}
  if(isDr(t)){
    const cl=t===30?'y':t===31?'r':t===32?'b':t===33?'g':'k';
    const lb=t===30?'CARGO':t===31?'MASTER':t===32?'LAB':t===33?'CLASSIFIED':'VAULT';
    if(doors[cl]){}
    else if(keys[cl]){doors[cl]=true;map[ny][nx]=Cc;sp(nx,ny,t===30?P.KY:t===31?P.KR:t===32?P.KB:t===33?P.KG:P.KK,30,5);document.getElementById('msg').innerHTML='🔓 '+lb+' DOOR!';player.x=nx;player.y=ny;steps++;return}
    else{document.getElementById('msg').innerHTML='🔒 Need '+lb+' card!';return}
  }
  if(t>=24&&t<=28){const cl=t===24?'y':t===25?'r':t===26?'b':t===27?'g':'k',lb=t===24?'CARGO':t===25?'MASTER':t===26?'LAB':t===27?'CLASSIFIED':'VAULT',cc=t===24?P.KY:t===25?P.KR:t===26?P.KB:t===27?P.KG:P.KK;keys[cl]=true;map[ny][nx]=Cc;sp(nx,ny,cc,20,5);const kc=(keys.y?1:0)+(keys.r?1:0)+(keys.b?1:0)+(keys.g?1:0)+(keys.k?1:0);document.getElementById('msg').innerHTML='🔑 '+lb+' CARD! ('+kc+'/5)'}
  if(t===Ex){if(keys.y&&keys.r&&keys.b&&keys.g&&keys.k){won=true;sp(nx,ny,'#40a060',60,8)}else{document.getElementById('msg').innerHTML='🚪 Find all 5 keycards!';return}}
  player.x=nx;player.y=ny;steps++;
}

// ═══════════ INPUT ═══════════
const kd={};
document.addEventListener('keydown',e=>{if(e.key==='r'||e.key==='R'){reset();return}kd[e.key.toLowerCase()]=true});
document.addEventListener('keyup',e=>{kd[e.key.toLowerCase()]=false});

function processInput(){
  if(won||dead){player.isMoving=false;return}
  let mx=0,my=0;
  if(kd['w']||kd['arrowup'])my=-1;
  if(kd['s']||kd['arrowdown'])my=1;
  if(kd['a']||kd['arrowleft'])mx=-1;
  if(kd['d']||kd['arrowright'])mx=1;
  if(mx!==0||my!==0){if(mx&&my){mx*=0.707;my*=0.707}move(mx,my)}else{player.isMoving=false;player.walkTimer=0}
}

function reset(){
  currentFloor=0;rmap();player={x:3,y:2,facing:2,walkTimer:0,isMoving:false};
  keys={y:false,r:false,b:false,g:false,k:false};doors={y:false,r:false,b:false,g:false,k:false};
  won=false;dead=false;steps=0;particles=[];dust=[];shk=0;cam={x:0,y:0,tx:0,ty:0};sg();
  document.getElementById('msg').innerHTML='WASD • 2 floors • Find 5 keycards • ESCAPE';
}

// Override loop for input
const _L=loop;loop=function(){processInput();_L()};
rmap();sg();loop();
</script>
