//12: Container interior - storage / hiding

//18: Gravel + south containers
[CN,CO,CO,CO,CO,CW,CW,CW,CW,CW,CW,CW,CW,CW,CW,CW,CW,CW,CW,CW,CW,CW,CW,CW,GV,GV,GV,GV,GV,GV,GV,GV,GV,GV,GV,GV,GV,GV,GV,GV,GV,GV,GV,GV,CO,CO,CN],

//22: Generator / maintenance area
[CN,CO,CO,CO,CW,CO,Ge,CO,CW,CO,CO,CO,CW,CO,CO,CO,CW,CO,CO,CO,CW,CO,CO,CO,CO,CO,CO,CO,CO,CO,CO,CO,CO,CO,CO,CO,CO,CO,Cr,CO,CO,CO,CO,CO,CW,CO,CO,CN],
//23: Maintenance corridor
[CN,CO,CO,CO,CW,CO,CS,CO,CW,CO,CO,CO,CW,CO,CO,CO,PI,CO,CO,CO,PI,CO,CO,CO,CO,CO,CO,CO,CO,CO,CO,CO,CO,CO,CO,CO,CO,CO,CO,CO,CO,CO,CO,CO,CW,CO,CO,CN],
//24: Underground lab entrance
[CN,CO,CO,CO,CW,CO,CO,CO,CW,CO,CO,CO,DRD,CO,CO,CO,CW,CO,CO,CO,CW,CO,CO,CO,CO,CO,CO,CO,SG,CO,CO,SG,CO,CO,CO,CO,CO,CO,CO,CO,CO,CO,CO,CO,CW,CO,CO,CN],

//26: Lab interior - experimentation
[CN,KB,CO,CO,CO,CO,CO,CO,CO,CO,CO,CO,CO,CO,CO,Dm,CO,CO,CO,CO,CO,CO,LT,CO,CO,LT,CO,CO,CO,CO,CT,CO,CO,LT,CO,CO,CO,BB,CO,CO,CO,CO,CO,CO,CO,CW,CO,CO,CN],
//27: Lab shelves & equipment

//28: Lab exit corridor
[CN,CO,CO,CO,CO,CO,CO,CO,CO,CO,CO,CO,CO,CO,CO,CO,CO,CO,CO,CO,CO,CO,EX,EX,EX,CO,CO,CO,CO,CO,CO,CO,CO,CO,SG,CO,CO,CO,CO,CO,CO,CO,CO,CO,CO,CW,CO,CO,CN],
//29: Bottom boundary
[CN,CN,CN,CN,CN,CN,CN,CN,CN,CN,CN,CN,CN,CN,CN,CN,CN,CN,CN,CN,CN,CN,CN,CN,CN,CN,CN,CN,CN,CN,CN,CN,CN,CN,CN,CN,CN,CN,CN,CN,CN,CN,CN,CN,CN,CN,CN,CN],
];

let map;
function rmap(){map=MAP.map(r=>[...r])}
function gt(x,y){return(x<0||y<0||x>=COLS||y>=ROWS)?CN:map[y][x]}

// ── GAME STATE ──
let player={x:3,y:2};
let keys={y:false,r:false,b:false};
let doors={y:false,r:false,b:false};
let won=false,dead=false,steps=0;
let guards=[],particles=[],dust=[];
let fc=0,cam={x:0,y:0,tx:0,ty:0};

// ── ROOM NAMES ──
function room(px,py){
  if(py<=2)return'CARGO PLATFORM';
  if(py>=3&&py<=6&&px<=36)return'TRACK 1 - MAIN LINE';
  if(py===7)return'CONCOURSE';
  if(py>=8&&py<=10&&px<=36)return'TRACK 2 - SIDING';
  if(py>=11&&py<=13&&px<=36)return'CONTAINER STORAGE';
  if(py===14)return'REAR PLATFORM';
  if(py>=15&&py<=18&&px>=23)return'TRACK 3 - SOUTH LINE';
  if(py>=19&&py<=21&&px<=23)return'CARGO HOLD';
  if(py>=22&&py<=24&&px<=23)return'MAINTENANCE BAY';
  if(py>=25&&py<=28)return'UNDERGROUND LAB';
  if(py>=27&&px>=22&&px<=24)return'ESCAPE TUNNEL';
  return'INDUSTRIAL ZONE';
}

// ── GUARDS ──
const PATROLS=[
  [{x:6,y:2},{x:14,y:2},{x:14,y:7},{x:6,y:7}],
  [{x:20,y:8},{x:36,y:8},{x:36,y:12},{x:20,y:12}],
  [{x:2,y:14},{x:16,y:14},{x:16,y:18},{x:2,y:18}],
  [{x:25,y:24},{x:38,y:24},{x:38,y:28},{x:25,y:28}],
  [{x:5,y:26},{x:18,y:26},{x:18,y:28},{x:5,y:28}],
];
function sg(){
  guards=PATROLS.map((p,i)=>({
    x:p[0].x,y:p[0].y,path:p,pi:0,pr:Math.random(),
    sp:0.015+i*0.004,
    clr:['#684840','#785848','#605860','#405860','#882828'][i],
    ty:i===4?'elite':'normal',
  }));
}

// ── PARTICLES ──
function sp(tx,ty,color,count,spd){
  for(let i=0;i<count;i++)particles.push({
    x:(tx+0.5)*TS,y:(ty+0.5)*TS,
    vx:(Math.random()-0.5)*(spd||4),
    vy:(Math.random()-0.5)*(spd||4),
    life:1,decay:0.015+Math.random()*0.04,
    color,size:1.5+Math.random()*3,
  });
}
function up(arr){for(let i=arr.length-1;i>=0;i--){const p=arr[i];p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;if(p.life<=0)arr.splice(i,1)}}
function dp(arr){for(const p of arr){ctx.globalAlpha=p.life*0.7;ctx.fillStyle=p.color;ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size)}ctx.globalAlpha=1}
function sd(){if(dust.length<60&&Math.random()<0.4)dust.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.2,vy:-0.03-Math.random()*0.15,life:1,decay:0.001+Math.random()*0.003,size:0.5+Math.random()*1.2})}

// ── UPDATE ──
function ug(){for(const g of guards){g.pr+=g.sp;if(g.pr>=1){g.pr-=1;g.pi=(g.pi+1)%g.path.length}const c=g.path[g.pi],n=g.path[(g.pi+1)%g.path.length];g.x=c.x+(n.x-c.x)*g.pr;g.y=c.y+(n.y-c.y)*g.pr}}
function gc(){for(const g of guards){const dx=player.x-g.x,dy=player.y-g.y;if(Math.sqrt(dx*dx+dy*dy)<(g.ty==='elite'?0.8:0.6)){dead=true;sp(player.x,player.y,'#883030',40,6);document.getElementById('msg').innerHTML='💀 CAUGHT! Press R to retry'}}}
function uc(){cam.tx=(player.x+0.5)*TS-canvas.width/2;cam.ty=(player.y+0.5)*TS-canvas.height/2;cam.tx=Math.max(0,Math.min(cam.tx,COLS*TS-canvas.width));cam.ty=Math.max(0,Math.min(cam.ty,ROWS*TS-canvas.height));cam.x+=(cam.tx-cam.x)*0.12;cam.y+=(cam.ty-cam.y)*0.12}

// ═══════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════

function rd(t,cx,cy,tx,ty){
  const x=cx-cam.x,y=cy-cam.y;
  if(x<-TS||y<-TS||x>canvas.width+TS||y>canvas.height+TS)return;
  if(t<=9||(t>=50&&t<=64)){rf(t,x,y,tx,ty)}
  else if(t>=10&&t<=17){rw(t,x,y,tx,ty)}
  else if(t>=20&&t<=22){rf(CO,x,y,tx,ty);rk(t,x,y)}
  else if(t>=30&&t<=32){rf(CO,x,y,tx,ty);rdo(t,x,y)}
  else if(t===40){rf(CO,x,y,tx,ty);re(x,y)}
}

// ── FLOOR TILES ──
function rf(t,x,y,tx,ty){
  // Base
  const base={[CO]:P.CONCRETE,[GV]:P.GRAVEL,[TH]:P.GRAVEL,[TV]:P.GRAVEL,[TX]:P.GRAVEL,[MG]:P.METAL,[OL]:P.TAR,[RU]:P.METAL_RUST,[TA]:P.TAR,[PF]:P.CONCRETE_LT};
  ctx.fillStyle=base[t]||P.CONCRETE;
  ctx.fillRect(x,y,TS,TS);

  // Subtle noise for concrete
  if(t===CO||t===PF){
    const n=((tx*7+ty*13)%5)*0.015;
    ctx.fillStyle='rgba(0,0,0,'+(0.02+n)+')';ctx.fillRect(x,y,TS,TS);
    // Grid
    ctx.fillStyle='rgba(0,0,0,0.06)';ctx.fillRect(x,y,TS,0.5);ctx.fillRect(x,y,0.5,TS);
    // Yellow safety line on platform
    if(t===PF){
      ctx.fillStyle=P.YELLOW_FAINT;
      ctx.fillRect(x,y+TS-3,TS,3);
    }
  }else if(t===GV){
    // Gravel texture - random dots
    ctx.fillStyle='rgba(0,0,0,0.06)';ctx.fillRect(x,y,TS,TS);
    for(let i=0;i<12;i++){
      const gx=x+2+((tx*31+ty*17+i*73)%(TS-4));
      const gy=y+2+((tx*53+ty*41+i*37)%(TS-4));
      ctx.fillStyle=((tx+ty+i)%3===0)?P.GRAVEL_LT:'rgba(0,0,0,0.08)';
      ctx.fillRect(gx,gy,1.5,1.5);
    }
  }else if(t===OL){
    ctx.fillStyle='rgba(20,18,16,0.3)';ctx.fillRect(x,y,TS,TS);
    ctx.fillStyle=P.OIL_SHEEN;
    ctx.beginPath();ctx.arc(x+TS*0.4+((tx*3)%TS*0.1),y+TS*0.5+((ty*7)%TS*0.1),TS*0.22,0,Math.PI*2);ctx.fill();
  }else if(t===MG){
    ctx.fillStyle=P.METAL;ctx.fillRect(x,y,TS,TS);
    ctx.fillStyle='rgba(0,0,0,0.08)';
    for(let i=0;i<TS;i+=3)ctx.fillRect(x+i,y,1,TS);
  }else if(t===RU){
    ctx.fillStyle=P.METAL_RUST;ctx.fillRect(x,y,TS,TS);
    ctx.fillStyle='rgba(80,30,20,0.2)';
    ctx.beginPath();ctx.arc(x+TS*0.5+((tx*5)%TS*0.05),y+TS*0.4+((ty*7)%TS*0.05),TS*0.15,0,Math.PI*2);ctx.fill();
  }

  // ── TRACK RENDERING ──
  if(t===TH || t===TV || t===TX){
    // Sleepers + rails
    if(t===TH || t===TX){
      // Horizontal sleepers
      for(let sx=0;sx<TS;sx+=6){
        ctx.fillStyle=((tx+sx)%12<6)?P.SLEEPER:P.SLEEPER_WORN;
        ctx.fillRect(x+sx,y+TS*0.2,5,TS*0.6);
      }
      // Top rail
      ctx.fillStyle=P.RAIL;ctx.fillRect(x,y+TS*0.28,TS,2.5);
      ctx.fillStyle=P.RAIL_SHINE;ctx.fillRect(x,y+TS*0.28,TS,0.8);
      // Bottom rail
      ctx.fillStyle=P.RAIL;ctx.fillRect(x,y+TS*0.58,TS,2.5);
      ctx.fillStyle=P.RAIL_SHINE;ctx.fillRect(x,y+TS*0.58,TS,0.8);
    }
    if(t===TV || t===TX){
      // Vertical sleepers
      for(let sy=0;sy<TS;sy+=6){
        ctx.fillStyle=((ty+sy)%12<6)?P.SLEEPER:P.SLEEPER_WORN;
        ctx.fillRect(x+TS*0.2,y+sy,TS*0.6,5);
      }
      // Left rail
      ctx.fillStyle=P.RAIL;ctx.fillRect(x+TS*0.28,y,2.5,TS);
      ctx.fillStyle=P.RAIL_SHINE;ctx.fillRect(x+TS*0.28,y,0.8,TS);
      // Right rail
      ctx.fillStyle=P.RAIL;ctx.fillRect(x+TS*0.58,y,2.5,TS);
      ctx.fillStyle=P.RAIL_SHINE;ctx.fillRect(x+TS*0.58,y,0.8,TS);
    }
  }

  // ── DECORATIONS ──
  rd2(t,x,y,tx,ty);
}

function rd2(t,x,y,tx,ty){
  const cx2=x+TS/2,cy2=y+TS/2;
  ctx.save();

  if(t===Cr){
    // Wooden cargo crate
    ctx.fillStyle='#5a4e3c';ctx.fillRect(cx2-9,cy2-8,18,16);
    ctx.fillStyle='#4a3e2c';ctx.fillRect(cx2-9,cy2-6,18,2);ctx.fillRect(cx2-9,cy2+4,18,2);
    ctx.fillStyle='#6a5e4c';ctx.fillRect(cx2-8,cy2-7,2,14);ctx.fillRect(cx2+6,cy2-7,2,14);
    // Label
    ctx.fillStyle='#3a2e1c';ctx.fillRect(cx2-4,cy2,8,3);
  }else if(t===Dm){
    // Oil drum
    ctx.fillStyle='#3a322c';ctx.fillRect(cx2-7,cy2-9,14,18);
    ctx.fillStyle='#4a423c';ctx.fillRect(cx2-7,cy2-1,14,3);ctx.fillRect(cx2-7,cy2+6,14,3);
    ctx.fillStyle='#5a3828';ctx.fillRect(cx2-6,cy2-8,2,16);
  }else if(t===TP){
    // Train buffer/part
    ctx.fillStyle='#4a4440';ctx.fillRect(cx2-8,cy2-6,16,12);
    ctx.fillStyle='#3a3430';ctx.fillRect(cx2-8,cy2-4,16,2);
    ctx.fillRect(cx2-6,cy2-5,12,1);ctx.fillRect(cx2-6,cy2+5,12,1);
  }else if(t===LT){
    // Lab table with test tubes
    ctx.fillStyle='#6a6e68';ctx.fillRect(x+4,cy2-7,TS-8,14);
    ctx.fillStyle='#7a7e78';ctx.fillRect(x+4,cy2-7,TS-8,2);
    // Test tubes on table
    const tubeColors=['rgba(100,200,150,0.5)','rgba(200,150,100,0.5)','rgba(100,150,200,0.5)','rgba(200,200,100,0.5)'];
    for(let i=0;i<4;i++){
      ctx.fillStyle=tubeColors[i];
      ctx.fillRect(x+6+i*5,cy2-13,3,6);
      ctx.fillStyle='rgba(255,255,255,0.2)';ctx.fillRect(x+6+i*5,cy2-13,1,6);
    }
  }else if(t===CT){
    // Chemical tank
    ctx.fillStyle='rgba(60,80,70,0.15)';ctx.fillRect(cx2-10,cy2-12,20,24);
    ctx.strokeStyle='#4a5850';ctx.lineWidth=1;ctx.strokeRect(cx2-10,cy2-12,20,24);
    ctx.fillStyle='rgba(80,140,100,0.2)';ctx.fillRect(cx2-9,cy2+2,18,8);
    // Warning label
    ctx.fillStyle='#805020';ctx.fillRect(cx2-6,cy2-6,12,8);
    ctx.fillStyle='#000';ctx.font='5px monospace';ctx.textAlign='center';ctx.fillText('HAZ',cx2,cy2);
  }else if(t===BB){
    // Biohazard barrel
    ctx.fillStyle='#4a3a28';ctx.fillRect(cx2-8,cy2-9,16,18);
    ctx.fillStyle='#5a4a38';ctx.fillRect(cx2-8,cy2-3,16,4);
    // Symbol
    ctx.fillStyle='#805020';ctx.beginPath();ctx.arc(cx2,cy2-5,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#000';ctx.beginPath();ctx.arc(cx2,cy2-5,2,0,Math.PI*2);ctx.fill();
  }else if(t===SG){
    // Warning sign on post
    ctx.fillStyle='#4a4440';ctx.fillRect(cx2-1,cy2-3,2,10);
    ctx.fillStyle='#805820';ctx.fillRect(cx2-8,cy2-10,16,10);
    ctx.fillStyle='#000';ctx.fillRect(cx2-6,cy2-8,12,6);
    ctx.fillStyle='#805820';ctx.font='6px monospace';ctx.textAlign='center';ctx.fillText('!',cx2,cy2-3);
  }else if(t===Sl){
    // Signal light
    ctx.fillStyle='#3a3834';ctx.fillRect(cx2-2,cy2-6,4,14);
    ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(cx2-5,cy2-8,10,6);
    const sigOn=Math.sin(fc*0.04+tx)>0;
    ctx.fillStyle=sigOn?'rgba(255,60,30,0.7)':'rgba(80,20,10,0.5)';
    ctx.fillRect(cx2-3,cy2-7,6,4);
  }else if(t===Pa){
    // Wooden pallet
    ctx.fillStyle='#5a4e3c';ctx.fillRect(cx2-8,cy2-6,16,4);
    ctx.fillRect(cx2-8,cy2+2,16,4);
    ctx.fillStyle='#4a3e2c';ctx.fillRect(cx2-7,cy2-4,2,10);ctx.fillRect(cx2,cy2-4,2,10);ctx.fillRect(cx2+5,cy2-4,2,10);
  }else if(t===Ge){
    // Generator
    ctx.fillStyle='#3a383a';ctx.fillRect(x+5,y+5,TS-10,TS-10);
    const gl=Math.sin(fc*0.05)*0.06+0.1;
    ctx.fillStyle='rgba(200,130,40,'+gl+')';ctx.fillRect(x+4,y+4,TS-8,TS-8);
    ctx.fillStyle='#484648';ctx.fillRect(x+7,y+7,TS-14,3);
  }else if(t===CS){
    // Cable spool
    ctx.fillStyle='#4a4438';ctx.fillRect(cx2-8,cy2-10,16,20);
    ctx.fillStyle='#3a3428';ctx.fillRect(cx2-7,cy2-8,14,2);ctx.fillRect(cx2-7,cy2+6,14,2);
    // Cable
    ctx.fillStyle='#2a2a2a';ctx.fillRect(cx2-5,cy2-4,10,8);
  }else if(t===EQ){
    // Abandoned equipment
    ctx.fillStyle='#4a4844';ctx.fillRect(cx2-8,cy2-6,16,14);
    ctx.fillStyle='#5a5854';ctx.fillRect(cx2-7,cy2-5,14,2);
    ctx.fillStyle='#3a3834';ctx.fillRect(cx2-5,cy2-1,2,6);ctx.fillRect(cx2+3,cy2-1,2,6);
  }else if(t===Be){
    // Bench
    ctx.fillStyle='#4a4238';ctx.fillRect(x+4,cy2-4,TS-8,8);
    ctx.fillStyle='#3a3228';ctx.fillRect(x+3,cy2-6,2,12);ctx.fillRect(x+TS-5,cy2-6,2,12);
  }else if(t===TT){
    // Test tube rack
    ctx.fillStyle='#5a5c56';ctx.fillRect(cx2-8,cy2-2,16,6);
    const tc=['rgba(80,180,120,0.6)','rgba(180,120,80,0.6)','rgba(80,120,180,0.6)','rgba(180,160,60,0.6)','rgba(160,80,140,0.6)'];
    for(let i=0;i<5;i++){
      ctx.fillStyle=tc[i];ctx.fillRect(cx2-6+i*3,cy2-8,2,6);
      ctx.fillStyle='rgba(255,255,255,0.2)';ctx.fillRect(cx2-6+i*3,cy2-8,0.5,5);
    }
  }else if(t===TB){
    // Toolbox
    ctx.fillStyle='#5a4030';ctx.fillRect(cx2-8,cy2-5,16,10);
    ctx.fillStyle='#6a5040';ctx.fillRect(cx2-8,cy2-5,16,2);
    ctx.fillStyle='#4a3020';ctx.fillRect(cx2-4,cy2-3,8,1);ctx.fillRect(cx2-4,cy2+1,8,1);
  }

  ctx.restore();
}

// ── WALLS ──
function rw(t,x,y,tx,ty){
  // Container walls (corrugated)
  if(t===CN||t===CD){
    ctx.fillStyle=t===CD?P.CONTAINER_RUST:P.CONTAINER;
    ctx.fillRect(x,y,TS,TS);
    // Corrugation lines
    for(let i=2;i<TS;i+=3){
      ctx.fillStyle='rgba(0,0,0,'+(t===CD?'0.2':'0.08')+')';
      ctx.fillRect(x+i,y,1.5,TS);
      ctx.fillStyle='rgba(255,255,255,0.03)';
      ctx.fillRect(x+i+1.5,y,0.5,TS);
    }
    // Top/bottom edge
    ctx.fillStyle='rgba(0,0,0,0.2)';ctx.fillRect(x,y,TS,1.5);
    ctx.fillRect(x,y+TS-1.5,TS,1.5);
    // Damage
    if(t===CD){
      ctx.fillStyle='rgba(60,30,20,0.3)';
      ctx.beginPath();ctx.arc(x+TS*0.5,y+TS*0.5,TS*0.2,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#1a1008';ctx.lineWidth=0.5;
      ctx.beginPath();ctx.moveTo(x+6,y+4);ctx.lineTo(x+TS/2,y+TS*0.4);ctx.lineTo(x+TS*0.7,y+TS*0.8);ctx.stroke();
    }
    // Container number
    ctx.fillStyle='rgba(255,255,255,0.06)';
    ctx.font='6px monospace';ctx.textAlign='center';
    const cn=(tx*7+ty*3)%1000;
    ctx.fillText('CT'+String(cn).padStart(3,'0'),x+TS/2,y+TS/2+3);
  }
  // Concrete wall
  else if(t===CW){
    ctx.fillStyle=P.CONCRETE_DK;ctx.fillRect(x,y,TS,TS);
    ctx.fillStyle=P.CONCRETE;ctx.fillRect(x+1,y+1,TS-2,TS-2);
    ctx.fillStyle='rgba(0,0,0,0.12)';ctx.fillRect(x+1,y+TS/2,TS-2,1);
    // Form tie holes
    ctx.fillStyle='rgba(0,0,0,0.15)';
    ctx.fillRect(x+TS*0.3-2,y+TS*0.25-2,4,4);
    ctx.fillRect(x+TS*0.7-2,y+TS*0.25-2,4,4);
    ctx.fillRect(x+TS*0.5-2,y+TS*0.7-2,4,4);
  }
  // Fence
  else if(t===FE){
    ctx.fillStyle=P.GRAVEL;ctx.fillRect(x,y,TS,TS);
    ctx.strokeStyle=P.FENCE;ctx.lineWidth=1;
    // Chain link pattern
    for(let i=0;i<=TS;i+=4){
      ctx.beginPath();ctx.moveTo(x+i,y);ctx.lineTo(x+i,y+TS);ctx.stroke();
    }
    ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=0.5;
    for(let i=2;i<TS;i+=4){
      ctx.beginPath();ctx.moveTo(x+i,y);ctx.lineTo(x+i,y+TS);ctx.stroke();
    }
    // Top rail
    ctx.fillStyle='#5a5854';ctx.fillRect(x,y,TS,2);
  }
  // Pipe
  else if(t===PI){
    ctx.fillStyle='#4a4642';ctx.fillRect(x+TS*0.35,y,TS*0.3,TS);
    ctx.fillStyle='#5a5652';ctx.fillRect(x+TS*0.37,y,TS*0.1,TS);
    ctx.fillStyle='rgba(0,0,0,0.15)';ctx.fillRect(x+TS*0.42,y,1,TS);
  }
  // Train car wall
  else if(t===TW){
    ctx.fillStyle='#4a4440';ctx.fillRect(x,y,TS,TS);
    ctx.fillStyle='#5a5450';ctx.fillRect(x+1,y+1,TS-2,TS-2);
    // Rivets
    ctx.fillStyle='rgba(0,0,0,0.15)';
    for(let ry=TS*0.2;ry<TS;ry+=TS*0.25){
      ctx.fillRect(x+3,ry,2,2);ctx.fillRect(x+TS-5,ry,2,2);
    }
    // Top ridge
    ctx.fillStyle='#3a3430';ctx.fillRect(x+2,y+TS*0.15,TS-4,2);
  }
  // Lab wall
  else if(t===LW){
    ctx.fillStyle=P.LAB_DARK;ctx.fillRect(x,y,TS,TS);
    ctx.fillStyle=P.LAB_TILE;ctx.fillRect(x+1,y+1,TS-2,TS-2);
    // Tile grid
    ctx.fillStyle='rgba(0,0,0,0.08)';
    ctx.fillRect(x+1,y+TS/2,TS-2,0.5);
    ctx.fillRect(x+TS/2,y+1,0.5,TS-2);
    // White tile glossy highlight
    ctx.fillStyle='rgba(255,255,255,0.04)';
    ctx.fillRect(x+1,y+1,TS-2,1.5);
  }
  // Door frame
  else if(t===DFR){
    ctx.fillStyle='#3a3632';ctx.fillRect(x,y,TS,TS);
    ctx.fillStyle='#2a2622';ctx.fillRect(x+TS*0.35,y+2,TS*0.3,TS-4);
  }
}

// ── KEY ──
function rk(t,x,y){
  const clrs={20:P.KEY_Y,21:P.KEY_R,22:P.KEY_B};
  const names={20:'ACCESS',21:'MASTER',22:'LAB'};
  const cl=clrs[t],cx2=x+TS/2,cy2=y+TS/2;
  const gl=Math.sin(fc*0.06)*0.2+0.3;
  // Glow
  ctx.fillStyle=cl.replace('rgb','rgba').replace(')',','+gl+')');
  ctx.fillRect(x+1,y+1,TS-2,TS-2);
  // Card shape
  ctx.fillStyle=cl;ctx.fillRect(cx2-7,cy2-10,14,20);
  ctx.fillStyle='rgba(255,255,255,0.12)';ctx.fillRect(cx2-6,cy2-9,12,2);
  ctx.fillStyle='rgba(0,0,0,0.2)';ctx.fillRect(cx2-6,cy2-4,12,1.5);ctx.fillRect(cx2-6,cy2,12,1.5);
  ctx.fillStyle='rgba(255,255,255,0.15)';ctx.fillRect(cx2-5,cy2+3,10,4);
  ctx.fillStyle='#000';ctx.font='4px monospace';ctx.textAlign='center';ctx.fillText(names[t],cx2,cy2+7);
}

// ── DOOR ──
function rdo(t,x,y){
  const clrs={30:P.KEY_Y,31:P.KEY_R,32:P.KEY_B};
  const cl=clrs[t];
  const op=(t===30&&doors.y)||(t===31&&doors.r)||(t===32&&doors.b);
  // Frame
  ctx.fillStyle='#3a3632';ctx.fillRect(x+1,y,TS-2,TS);
  ctx.fillStyle='#2a2622';ctx.fillRect(x+TS*0.35,y+2,TS*0.3,TS-4);
  if(!op){
    // Closed rolling door
    ctx.fillStyle='#52504c';ctx.fillRect(x+3,y+2,TS-6,TS-4);
    for(let i=6;i<TS-6;i+=4){
      ctx.fillStyle='rgba(0,0,0,0.12)';ctx.fillRect(x+3,y+i,TS-6,1.5);
    }
    const pu=Math.sin(fc*0.08)*0.2+0.5;
    ctx.fillStyle=cl.replace('rgb','rgba').replace(')',','+pu+')');
    ctx.fillRect(x+TS/2-4,y+TS/2-4,8,8);
    ctx.fillStyle='#1a1a18';ctx.fillRect(x+TS/2-1,y+TS/2-3,2,7);
  }else{
    ctx.fillStyle=P.CONCRETE;ctx.fillRect(x+3,y+2,TS-6,TS-4);
    ctx.fillStyle='#508050';ctx.fillRect(x+TS/2-4,y+TS/2-4,8,8);
  }
}

// ── EXIT ──
function re(x,y){
  const gl=Math.sin(fc*0.05)*0.2+0.3;
  // Tunnel opening
  ctx.fillStyle='#1a1814';ctx.fillRect(x+4,y+3,TS-8,TS-6);
  ctx.fillStyle='rgba(40,140,70,'+(gl*0.5)+')';
  ctx.fillRect(x+6,y+5,TS-12,TS-10);
  // Light at end of tunnel
  ctx.fillStyle='rgba(255,255,255,'+(gl*0.3)+')';
  ctx.fillRect(x+TS/2-3,y+TS/2-3,6,6);
  // Arrow
  ctx.fillStyle='rgba(255,255,255,0.5)';const cx2=x+TS/2,cy2=y+TS/2;
  ctx.fillRect(cx2-4,cy2-2,5,2);ctx.fillRect(cx2,cy2-5,2,11);
}

// ── PLAYER (top-down view) ──
function dpl(){
  const px=(player.x+0.5)*TS-cam.x,py=(player.y+0.5)*TS-cam.y;
  const s=TS*0.44;
  ctx.save();ctx.translate(px,py);

  // Shadow (below feet)
  ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(-s*0.7,-s*0.1,s*1.4,s*0.4);

  // Body (orange jumpsuit - top down)
  ctx.fillStyle='#886030';ctx.fillRect(-s*0.32,-s*0.25,s*0.64,s*0.55);
  // Shoulders
  ctx.fillStyle='#886030';ctx.fillRect(-s*0.55,-s*0.2,s*1.1,s*0.3);

  // Head (top of head visible in top-down)
  ctx.fillStyle='#c4a890';ctx.fillRect(-s*0.22,-s*0.6,s*0.44,s*0.35);
  // Hair
  ctx.fillStyle='#302010';ctx.fillRect(-s*0.22,-s*0.6,s*0.44,s*0.15);

  // Arms (at sides, visible)
  ctx.fillStyle='#886030';ctx.fillRect(-s*0.65,-s*0.1,s*0.18,s*0.4);
  ctx.fillRect(s*0.47,-s*0.1,s*0.18,s*0.4);

  // Legs
  ctx.fillStyle='#34302c';ctx.fillRect(-s*0.22,s*0.3,s*0.18,s*0.4);
  ctx.fillRect(s*0.04,s*0.3,s*0.18,s*0.4);

  // Boots
  ctx.fillStyle='#1a1814';ctx.fillRect(-s*0.26,s*0.65,s*0.22,s*0.12);
  ctx.fillRect(s*0.04,s*0.65,s*0.22,s*0.12);

  ctx.restore();
}

// ── GUARD (top-down view) ──
function dg(g){
  const gx=(g.x+0.5)*TS-cam.x,gy=(g.y+0.5)*TS-cam.y;
  const s=TS*0.46;
  ctx.save();ctx.translate(gx,gy);

  ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(-s*0.7,-s*0.1,s*1.4,s*0.4);

  // Body
  ctx.fillStyle=g.ty==='elite'?'#201830':'#1e1e34';
  ctx.fillRect(-s*0.34,-s*0.25,s*0.68,s*0.55);
  // Vest
  ctx.fillStyle=g.clr;ctx.fillRect(-s*0.28,-s*0.1,s*0.56,s*0.3);
  // Shoulders
  ctx.fillStyle='#1a1a28';ctx.fillRect(-s*0.55,-s*0.18,s*1.1,s*0.25);

  // Head
  ctx.fillStyle='#b09078';ctx.fillRect(-s*0.22,-s*0.6,s*0.44,s*0.35);
  // Helmet
  ctx.fillStyle=g.clr;ctx.fillRect(-s*0.22,-s*0.6,s*0.44,s*0.14);

  // Arms (with gun on right)
  ctx.fillStyle='#1a1a28';ctx.fillRect(-s*0.65,-s*0.1,s*0.18,s*0.4);
  ctx.fillStyle=g.clr;ctx.fillRect(s*0.47,-s*0.08,s*0.6,s*0.14);
  ctx.fillStyle='#2a2826';ctx.fillRect(s*0.7,-s*0.1,s*0.1,s*0.18);

  // Legs
  ctx.fillStyle='#1a1a28';ctx.fillRect(-s*0.22,s*0.3,s*0.18,s*0.4);
  ctx.fillRect(s*0.04,s*0.3,s*0.18,s*0.4);

  ctx.restore();
}

// ── MAIN DRAW ──
function draw(){
  ctx.fillStyle='#080810';ctx.fillRect(0,0,canvas.width,canvas.height);

  const sc=Math.max(0,Math.floor(cam.x/TS)-1);
  const ec=Math.min(COLS,Math.ceil((cam.x+canvas.width)/TS)+1);
  const sr=Math.max(0,Math.floor(cam.y/TS)-1);
  const er=Math.min(ROWS,Math.ceil((cam.y+canvas.height)/TS)+1);

  for(let r=sr;r<er;r++)for(let c=sc;c<ec;c++)rd(map[r][c],c*TS,r*TS,c,r);

  dp(dust);

  // Flicker in lab/generator
  const rn=room(player.x,player.y);
  if((rn==='UNDERGROUND LAB'||rn==='MAINTENANCE BAY')&&Math.sin(fc*0.09)>0.6){
    ctx.fillStyle='rgba(0,0,0,0.2)';ctx.fillRect(0,0,canvas.width,canvas.height);
  }

  if(!won&&!dead){for(const g of guards)dg(g);dpl()}
  dp(particles);

  // Radial vignette
  const grd=ctx.createRadialGradient(canvas.width/2,canvas.height/2,canvas.width*0.35,
    canvas.width/2,canvas.height/2,canvas.width*0.8);
  grd.addColorStop(0,'rgba(0,0,0,0)');grd.addColorStop(1,'rgba(0,0,0,0.6)');
  ctx.fillStyle=grd;ctx.fillRect(0,0,canvas.width,canvas.height);

  if(won){
    ctx.fillStyle='rgba(0,0,0,0.85)';ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#60a070';ctx.font='bold 42px "Courier New",monospace';ctx.textAlign='center';
    ctx.fillText('FREEDOM',canvas.width/2,canvas.height/2-22);
    ctx.fillStyle='#8ab090';ctx.font='16px "Courier New",monospace';
    ctx.fillText('You escaped the abandoned station.',canvas.width/2,canvas.height/2+14);
    ctx.fillText('Press R to play again',canvas.width/2,canvas.height/2+36);
  }
  if(dead){
    ctx.fillStyle='rgba(50,0,0,0.65)';ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#a04040';ctx.font='bold 36px "Courier New",monospace';ctx.textAlign='center';
    ctx.fillText('TERMINATED',canvas.width/2,canvas.height/2);
  }
  ctx.textAlign='start';
}

// ── GAME LOOP ──
function loop(){
  fc++;
  if(!won&&!dead){ug();gc();sd()}
  uc();up(particles);up(dust);draw();

  const kc=(keys.y?1:0)+(keys.r?1:0)+(keys.b?1:0);
  document.getElementById('keys').textContent=kc+'/3';
  document.getElementById('roomName').textContent=room(player.x,player.y);
  document.getElementById('steps').textContent=steps;

  const near=guards.some(g=>Math.sqrt((player.x-g.x)**2+(player.y-g.y)**2)<4);
  const med=guards.some(g=>Math.sqrt((player.x-g.x)**2+(player.y-g.y)**2)<8);
  const th=document.getElementById('threat');
  th.textContent=near?'⚠ HIGH':med?'⚡ MED':'⚡ LOW';
  th.style.color=near?'#a04040':med?'#a88040':'#608060';

  requestAnimationFrame(loop);
}

// ── MOVEMENT ──
function move(dx,dy){
  if(won||dead)return;
  const nx=player.x+dx,ny=player.y+dy;
  if(nx<0||ny<0||nx>=COLS||ny>=ROWS)return;
  const t=gt(nx,ny);
  if(!wk(t)&&!isDr(t)&&t!==EX)return;

  if(isDr(t)){
    const cl=t===30?'y':t===31?'r':'b';
    const lb=t===30?'ACCESS':t===31?'MASTER':'LAB';
    if(doors[cl]){}
    else if(keys[cl]){
      doors[cl]=true;map[ny][nx]=CO;
      sp(nx,ny,t===30?'#c8a030':t===31?'#984030':'#5080b0',30,5);
      document.getElementById('msg').innerHTML='🔓 '+lb+' DOOR UNLOCKED!';
      player.x=nx;player.y=ny;steps++;return;
    }else{document.getElementById('msg').innerHTML='🔒 Need '+lb+' card!';return}
  }

  if(t>=20&&t<=22){
    const cl=t===20?'y':t===21?'r':'b';
    const lb=t===20?'ACCESS':t===21?'MASTER':'LAB';
    const cc=t===20?'#c8a030':t===21?'#984030':'#5080b0';
    keys[cl]=true;map[ny][nx]=CO;sp(nx,ny,cc,20,5);
    const kc=(keys.y?1:0)+(keys.r?1:0)+(keys.b?1:0);
    document.getElementById('msg').innerHTML='🔑 '+lb+' CARD! ('+kc+'/3)';
  }

  if(t===EX){
    if(keys.y&&keys.r&&keys.b){won=true;sp(nx,ny,'#40a060',60,8);document.getElementById('msg').innerHTML='🎉 YOU ESCAPED! R to replay'}
    else{document.getElementById('msg').innerHTML='🚪 Find all 3 access cards!';return}
  }
  player.x=nx;player.y=ny;steps++;
}

// ── INPUT ──
document.addEventListener('keydown',e=>{
  if(e.key==='r'||e.key==='R'){reset();return}
  const k=e.key.toLowerCase();
  if(k==='w'||k==='arrowup'){e.preventDefault();move(0,-1)}
  if(k==='s'||k==='arrowdown'){e.preventDefault();move(0,1)}
  if(k==='a'||k==='arrowleft'){e.preventDefault();move(-1,0)}
  if(k==='d'||k==='arrowright'){e.preventDefault();move(1,0)}
});

function reset(){
  rmap();player={x:3,y:2};
  keys={y:false,r:false,b:false};doors={y:false,r:false,b:false};
  won=false;dead=false;steps=0;particles=[];dust=[];
  cam={x:0,y:0,tx:0,ty:0};sg();
  document.getElementById('msg').innerHTML='WASD to move • Explore the abandoned station • Find 3 access cards • ESCAPE';
}

rmap();sg();loop();
</script>
