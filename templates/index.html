//11: container row

//12: container interior
const R12=[WA,C,C,C,C,C,C,C,C,Cr,C,C,C,Cr,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,WA,C,Lp,C,C,C,WA,C,C,WA];
//13: back wall

//14: rear area
const R14=[WA,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,WA,C,C,WA];
//15: south platform
const R15=[WA,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,PF,PF,PF,PF,PF,PF,PF,PF,PF,PF,PF,PF,PF,PF,PF,PF,PF,PF,PF,PF,PF,PF,C,C,WA];
//16: gravel track 3
const R16=[WA,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,G,G,G,G,G,G,G,G,G,G,G,G,G,G,G,G,G,G,G,G,G,G,C,C,WA];
//17: rails 3
const R17=[WA,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,TH,TH,TH,TH,TH,TH,TH,TH,TH,TH,TH,TH,TH,TH,TH,TH,TH,TH,TH,TH,TH,TH,C,C,WA];
//18: gravel + containers south
const R18=[WA,C,C,C,C,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,G,G,G,G,G,G,G,G,G,G,G,G,G,G,G,G,G,G,G,G,G,G,C,C,WA];
//19: south container interior
const R19=[WA,C,KR,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,C,C,WA];
//20: container interior
const R20=[WA,C,C,C,C,C,C,C,C,Cr,C,C,C,C,C,C,C,C,C,C,C,C,C,C,TT,C,C,C,C,Dm,C,C,EQ,C,C,C,C,Cr,C,C,C,C,C,WA,C,C,WA];
//21: south container back
const R21=[WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,C,C,WA];
//22: generator corridor
const R22=[WA,C,C,C,WA,C,Ge,C,WA,C,C,C,WA,C,C,C,WA,C,C,C,WA,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,Cr,C,C,C,C,WA,C,C,WA];
//23: maintenance
const R23=[WA,C,C,C,WA,C,CS,C,WA,C,C,C,WA,C,C,C,PI,C,C,C,PI,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,WA,C,C,WA];
//24: maintenance - VENT entrance to hidden lab
const R24=[WA,C,C,C,WA,C,C,C,WA,C,C,C,DRD,C,C,C,WA,C,C,C,WA,HW,HW,HW,VT,C,C,BB,C,SG,C,C,SG,C,C,C,C,C,C,C,C,C,C,WA,C,C,WA];
//25: underground lab section (hidden behind containers)
const R25=[WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,LW,LW,LW,LW,LW,LW,LW,LW,LW,LW,LW,LW,LW,LD,LW,LW,LW,LW,LW,WA,WA,WA,WA,WA,C,C,WA];
//26: lab interior - hidden experimentation
const R26=[WA,KB,C,C,C,C,C,C,C,C,C,C,C,C,C,Dm,C,C,C,C,C,C,LT,C,C,LT,C,C,C,C,CT,C,C,LT,C,C,C,BB,C,C,Po,C,C,C,WA,C,C,WA];
//27: lab experiment room
const R27=[WA,C,C,C,C,Dm,C,C,C,C,Cr,C,C,EQ,C,C,C,C,C,BB,C,C,LT,TT,C,C,C,CT,C,C,C,C,C,C,C,LT,C,C,C,C,C,C,WA,C,C,WA];
//28: lab exit corridor (hidden exit)
const R28=[WA,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,C,EX,EX,EX,C,C,C,C,C,Lf,C,C,SG,C,C,C,C,C,KG,C,C,C,C,WA,C,C,WA];
//29: bottom boundary
const R29=[WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA,WA];

const MAP=[R0,R1,R2,R3,R4,R5,R6,R7,R8,R9,R10,R11,R12,R13,R14,R15,R16,R17,R18,R19,R20,R21,R22,R23,R24,R25,R26,R27,R28,R29];
let map;

// ── GAME STATE ──
let player={x:3,y:2};
let keys={y:false,r:false,b:false,g:false};
let doors={y:false,r:false,b:false,g:false};
let won=false,dead=false,steps=0,secretFound=false;
let guards=[],particles=[],dust=[],lights=[];
let fc=0,cam={x:0,y:0,tx:0,ty:0};
let shk=0;

function rmap(){map=MAP.map(r=>[...r])}
function gt(x,y){return(x<0||y<0||x>=COLS||y>=ROWS)?WA:map[y][x]}

function room(px,py){
  if(py<=2)return'CARGO PLATFORM';
  if(py>=3&&py<=6&&px<=37)return'TRACK 1 - MAIN LINE';
  if(py===7)return'CONCOURSE';
  if(py>=8&&py<=10&&px<=37)return'TRACK 2 - SIDING';
  if(py>=11&&py<=13&&px<=37)return'CONTAINER STORAGE';
  if(py===14)return'REAR PLATFORM';
  if(py>=15&&py<=18&&px>=24)return'TRACK 3 - SOUTH LINE';
  if(py>=19&&py<=21&&px<=23)return'CARGO HOLD';
  if(py>=22&&py<=24&&px<=23)return'MAINTENANCE BAY';
  if(py>=25&&py<=28&&px>=21)return'⚠ CLASSIFIED ⚠';
  if(px>36)return'EAST CORRIDOR';
  return'INDUSTRIAL ZONE';
}

// ── GUARDS ──
const PATROLS=[
  [{x:6,y:2},{x:15,y:2},{x:15,y:7},{x:6,y:7}],
  [{x:20,y:8},{x:36,y:8},{x:36,y:12},{x:20,y:12}],
  [{x:2,y:14},{x:17,y:14},{x:17,y:18},{x:2,y:18}],
  [{x:25,y:22},{x:39,y:22},{x:39,y:24},{x:25,y:24}],
  [{x:23,y:26},{x:38,y:26},{x:38,y:28},{x:23,y:28}],
];
function sg(){guards=PATROLS.map((p,i)=>({x:p[0].x,y:p[0].y,path:p,pi:0,pr:Math.random(),sp:0.015+i*0.004,clr:['#684840','#785848','#605860','#405860','#982828'][i],ty:i===4?'elite':'normal'}))}

// ── PARTICLES ──
function sp(tx,ty,color,count,spd){for(let i=0;i<count;i++)particles.push({x:(tx+0.5)*TS,y:(ty+0.5)*TS,vx:(Math.random()-0.5)*(spd||4),vy:(Math.random()-0.5)*(spd||4),life:1,decay:0.015+Math.random()*0.04,color,size:1.5+Math.random()*3})}
function up(arr){for(let i=arr.length-1;i>=0;i--){const p=arr[i];p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;if(p.life<=0)arr.splice(i,1)}}
function dp(arr){for(const p of arr){ctx.globalAlpha=p.life*0.7;ctx.fillStyle=p.color;ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size)}ctx.globalAlpha=1}
function sd(){if(dust.length<80&&Math.random()<0.5)dust.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.15,vy:-0.02-Math.random()*0.12,life:1,decay:0.0008+Math.random()*0.002,size:0.3+Math.random()*1})}

// ── UPDATE ──
function ug(){for(const g of guards){g.pr+=g.sp;if(g.pr>=1){g.pr-=1;g.pi=(g.pi+1)%g.path.length}const c=g.path[g.pi],n=g.path[(g.pi+1)%g.path.length];g.x=c.x+(n.x-c.x)*g.pr;g.y=c.y+(n.y-c.y)*g.pr}}
function gc(){for(const g of guards){const dx=player.x-g.x,dy=player.y-g.y;if(Math.sqrt(dx*dx+dy*dy)<(g.ty==='elite'?0.8:0.6)){dead=true;sp(player.x,player.y,'#883030',50,7);shk=15;document.getElementById('msg').innerHTML='💀 CAUGHT! Press R to retry'}}}
function uc(){cam.tx=(player.x+0.5)*TS-canvas.width/2;cam.ty=(player.y+0.5)*TS-canvas.height/2;cam.tx=Math.max(0,Math.min(cam.tx,COLS*TS-canvas.width));cam.ty=Math.max(0,Math.min(cam.ty,ROWS*TS-canvas.height));cam.x+=(cam.tx-cam.x)*0.12;cam.y+=(cam.ty-cam.y)*0.12}
if(shk>0)shk*=0.85;

// ══════════════════════════════════════
// 2.5D RENDERING SYSTEM
// ══════════════════════════════════════

function drawShadow(x,y,w,h,a){ctx.fillStyle='rgba(0,0,0,'+a+')';ctx.fillRect(x,y,w,h)}

function rd(t,cx,cy,tx,ty){
  const sx=cx-cam.x,sy=cy-cam.y;
  if(sx<-TS||sy<-TS*2||sx>canvas.width+TS||sy>canvas.height+TS)return;

  // Floor
  if(t<=9||(t>=50&&t<=68)){
    rf(t,sx,sy,tx,ty);
    // Wall shadow from tile above this one
    const above=gt(tx,ty-1);
    if(isWall(above)&&above!==FE&&above!==PI){
      drawShadow(sx,sy-2,TS,14,0.45);
    }
  }
  // Walls with 2.5D depth
  else if(isWall(t)){
    rw25d(t,sx,sy,tx,ty);
  }
  // Keys
  else if(t>=20&&t<=23){
    const aboveW=isWall(gt(tx,ty-1));
    if(aboveW)drawShadow(sx,sy-2,TS,14,0.45);
    rf(C,sx,sy,tx,ty);rk(t,sx,sy);
  }
  // Doors
  else if(t>=30&&t<=33){
    const aboveW=isWall(gt(tx,ty-1));
    if(aboveW)drawShadow(sx,sy-2,TS,14,0.45);
    rf(C,sx,sy,tx,ty);rdo(t,sx,sy);
  }
  // Vent
  else if(t===VT){
    rf(C,sx,sy,tx,ty);rv(sx,sy);
  }
  // Exit
  else if(t===EX){
    rf(C,sx,sy,tx,ty);re(sx,sy);
  }
}

// ── FLOOR ──
function rf(t,x,y,tx,ty){
  const base={[C]:P.CONCRETE,[G]:P.GRAVEL,[TH]:P.GRAVEL,[TV]:P.GRAVEL,[TX]:P.GRAVEL,[MG]:P.METAL,[OL]:P.TAR,[RU]:P.RUST,[TA]:P.TAR,[PF]:P.CONCRETE_LT};
  ctx.fillStyle=base[t]||P.CONCRETE;ctx.fillRect(x,y,TS,TS);

  if(t===C||t===PF){
    ctx.fillStyle='rgba(0,0,0,'+(0.015+((tx*7+ty*13)%5)*0.01)+')';ctx.fillRect(x,y,TS,TS);
    ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(x,y,TS,0.5);ctx.fillRect(x,y,0.5,TS);
    if(t===PF){ctx.fillStyle='rgba(120,100,40,0.2)';ctx.fillRect(x,y+TS-3,TS,3)}
  }else if(t===G){
    ctx.fillStyle='rgba(0,0,0,0.06)';ctx.fillRect(x,y,TS,TS);
    for(let i=0;i<12;i++){const gx=x+2+((tx*31+ty*17+i*73)%(TS-4)),gy=y+2+((tx*53+ty*41+i*37)%(TS-4));ctx.fillStyle=((tx+ty+i)%3===0)?P.GRAVEL_LT:'rgba(0,0,0,0.08)';ctx.fillRect(gx,gy,1,1)}
  }else if(t===OL){
    ctx.fillStyle='rgba(16,14,12,0.35)';ctx.fillRect(x,y,TS,TS);

// ── 2.5D WALL ──
function rw25d(t,x,y,tx,ty){
  const DEPTH=14;
  const topClr=t===WA?P.WALL_TOP:t===WR?'#504e4c':t===WD?'#423e3c':t===LW?P.LAB_WALL_TOP:t===LD?'#4a4c48':t===HW?P.HIDDEN_WALL:P.WALL_TOP;
  const faceClr=t===WA?P.WALL_FACE:t===WR?'#403e3c':t===WD?'#322e2c':t===LW?P.LAB_WALL_FACE:t===LD?'#3a3c38':t===HW?P.HIDDEN_WALL:P.WALL_FACE;
  const depthClr=t===WA?P.WALL_DEPTH:t===WD?'#1a1410':t===LW?P.LAB_WALL_DEPTH:t===HW?'#1a1814':P.WALL_DEPTH;
  const depthDk=t===WA?P.WALL_DEPTH_DK:'#0e0c08';

  // Depth side face (the 3D part)
  ctx.fillStyle=depthClr;
  ctx.fillRect(x,y+TS-DEPTH,TS,DEPTH);
  // Shadow gradient on depth
  const dg=ctx.createLinearGradient(x,y+TS-DEPTH,x,y+TS);
  dg.addColorStop(0,depthClr);dg.addColorStop(1,depthDk);
  ctx.fillStyle=dg;ctx.fillRect(x,y+TS-DEPTH,TS,DEPTH);

  // Wall face
  ctx.fillStyle=faceClr;ctx.fillRect(x,y+DEPTH*0.3,TS,TS-DEPTH);
  // Top cap (lit edge)
  ctx.fillStyle=topClr;ctx.fillRect(x,y,TS,DEPTH*0.5);

  // Texture
  if(t===WA||t===WR){
    ctx.fillStyle='rgba(0,0,0,0.08)';ctx.fillRect(x,y+DEPTH*0.4,TS,1);
    ctx.fillStyle='rgba(0,0,0,0.04)';ctx.fillRect(x,y+DEPTH*0.5+TS*0.25,TS,0.5);
    ctx.fillStyle='rgba(255,255,255,0.02)';ctx.fillRect(x,y,TS,DEPTH*0.25);
    // Rivets on reinforced
    if(t===WR){ctx.fillStyle='rgba(0,0,0,0.12)';for(let ry=DEPTH+4;ry<TS-DEPTH;ry+=8)for(let rx=4;rx<TS-4;rx+=12)ctx.fillRect(x+rx,y+ry,2,2)}
  }
  if(t===WD){
    ctx.strokeStyle='#1a1612';ctx.lineWidth=0.8;ctx.beginPath();ctx.moveTo(x+6,y+DEPTH);ctx.lineTo(x+TS/2,y+TS*0.4);ctx.lineTo(x+TS*0.7,y+TS-DEPTH+2);ctx.stroke();
    ctx.fillStyle='#201a14';ctx.fillRect(x+2,y+TS-DEPTH-2,5,3);
  }
  if(t===LW){
    ctx.fillStyle='rgba(255,255,255,0.03)';ctx.fillRect(x+1,y+DEPTH,TS-2,0.5);
    ctx.fillStyle='rgba(0,0,0,0.06)';ctx.fillRect(x+TS/2,y+DEPTH,0.5,TS-DEPTH);
  }
  if(t===HW){
    // Hidden wall - looks slightly different, has a subtle vent marking
    ctx.fillStyle='rgba(0,0,0,0.12)';ctx.fillRect(x+TS*0.3,y+DEPTH+4,TS*0.4,TS*0.4);
    ctx.fillStyle='rgba(80,80,80,0.15)';ctx.fillRect(x+TS*0.35,y+DEPTH+6,TS*0.3,TS*0.3);
    for(let i=0;i<4;i++)ctx.fillStyle='rgba(0,0,0,0.15)',ctx.fillRect(x+TS*0.38,y+DEPTH+8+i*5,TS*0.24,1);
  }
  if(t===FE){
    ctx.fillStyle=P.GRAVEL;ctx.fillRect(x,y+DEPTH*0.3,TS,TS-DEPTH*0.3);
    ctx.strokeStyle='#444';ctx.lineWidth=0.8;
    for(let i=0;i<=TS;i+=4){ctx.beginPath();ctx.moveTo(x+i,y+DEPTH*0.3);ctx.lineTo(x+i,y+TS);ctx.stroke()}
    ctx.fillStyle='#4a4844';ctx.fillRect(x,y+DEPTH*0.3,TS,2);
  }
  if(t===PI){
    ctx.fillStyle='#3a3630';ctx.fillRect(x+TS*0.35,y+DEPTH*0.3,TS*0.3,TS-DEPTH*0.2);
    ctx.fillStyle='#4a4640';ctx.fillRect(x+TS*0.38,y+DEPTH*0.3,TS*0.08,TS-DEPTH*0.2);
  }
  if(t===WG){
    ctx.fillStyle='rgba(80,100,130,0.08)';ctx.fillRect(x+3,y+DEPTH+2,TS-6,TS-DEPTH*2);
    ctx.strokeStyle='#3a3c40';ctx.lineWidth=0.8;ctx.strokeRect(x+3,y+DEPTH+2,TS-6,TS-DEPTH*2);
  }
  if(t===WB){
    ctx.fillStyle='#3a3834';for(let i=0;i<4;i++)ctx.fillRect(x+4+i*6,y+DEPTH+2,3,TS-DEPTH*2-4);
  }

  // Drop shadow on tile below
  const below=gt(tx,ty+1);
  if(!isWall(below)&&below!==FE){drawShadow(x,y+TS-2,TS,8,0.5)}
}

// ── MAIN DRAW ──
function draw(){
  ctx.fillStyle='#060610';ctx.fillRect(0,0,canvas.width,canvas.height);

  const sc=Math.max(0,Math.floor(cam.x/TS)-1);
  const ec=Math.min(COLS,Math.ceil((cam.x+canvas.width)/TS)+1);
  const sr=Math.max(0,Math.floor(cam.y/TS)-2);
  const er=Math.min(ROWS,Math.ceil((cam.y+canvas.height)/TS)+2);

  // Draw floor + objects first, then walls (for proper occlusion)
  for(let r=sr;r<er;r++)for(let c=sc;c<ec;c++){
    const t=map[r][c];
    if(!isWall(t)||t===FE||t===PI)rd(t,c*TS,r*TS,c,r);
  }
  // Then draw walls (on top)
  for(let r=sr;r<er;r++)for(let c=sc;c<ec;c++){
    const t=map[r][c];
    if(isWall(t)&&t!==FE&&t!==PI)rd(t,c*TS,r*TS,c,r);
  }

  dp(dust);

  const rn=room(player.x,player.y);
  if((rn==='⚠ CLASSIFIED ⚠'||rn==='MAINTENANCE BAY')&&Math.sin(fc*0.09)>0.55){
    ctx.fillStyle='rgba(0,0,0,0.18)';ctx.fillRect(0,0,canvas.width,canvas.height);
  }

  if(!won&&!dead){for(const g of guards)dg(g);dpl()}
  dp(particles);

  // Advanced vignette with directional light feel
  const grd=ctx.createRadialGradient(canvas.width/2,canvas.height*0.4,canvas.width*0.3,canvas.width/2,canvas.height*0.4,canvas.width*0.85);
  grd.addColorStop(0,'rgba(0,0,0,0)');grd.addColorStop(1,'rgba(0,0,0,0.7)');
  ctx.fillStyle=grd;ctx.fillRect(0,0,canvas.width,canvas.height);

  // Screen shake
  let sx=0,sy=0;if(shk>0.5){sx=(Math.random()-0.5)*shk*1.5;sy=(Math.random()-0.5)*shk*1.5}
  if(sx||sy){const img=ctx.getImageData(0,0,canvas.width,canvas.height);ctx.fillStyle='#060610';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.putImageData(img,sx,sy)}

  if(won){
    ctx.fillStyle='rgba(0,0,0,0.85)';ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#60a070';ctx.font='bold 40px "Courier New",monospace';ctx.textAlign='center';
    ctx.fillText('FREEDOM',canvas.width/2,canvas.height/2-22);
    ctx.fillStyle='#8ab090';ctx.font='15px "Courier New",monospace';
    ctx.fillText('You escaped the abandoned station.',canvas.width/2,canvas.height/2+14);
    ctx.fillText('Press R to play again',canvas.width/2,canvas.height/2+34);
  }
  if(dead){
    ctx.fillStyle='rgba(40,0,0,0.7)';ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#a04040';ctx.font='bold 34px "Courier New",monospace';ctx.textAlign='center';
    ctx.fillText('TERMINATED',canvas.width/2,canvas.height/2);
  }
  ctx.textAlign='start';
}

// ── LOOP ──
function loop(){
  fc++;
  if(!won&&!dead){ug();gc();sd()}
  uc();if(shk>0)shk*=0.85;
  up(particles);up(dust);draw();

  const kc=(keys.y?1:0)+(keys.r?1:0)+(keys.b?1:0)+(keys.g?1:0);
  document.getElementById('keys').textContent=kc+'/4';
  document.getElementById('roomName').textContent=room(player.x,player.y);
  document.getElementById('steps').textContent=steps;
  const sec=document.getElementById('secret');
  if(secretFound){sec.textContent='🔓 CLASSIFIED';sec.style.color='#60a060'}else{sec.textContent='🔒 ???';sec.style.color='#504030'}

  const near=guards.some(g=>Math.sqrt((player.x-g.x)**2+(player.y-g.y)**2)<4);
  const med=guards.some(g=>Math.sqrt((player.x-g.x)**2+(player.y-g.y)**2)<8);
  const th=document.getElementById('threat');
  th.textContent=near?'⚠ HIGH':med?'⚡ MED':'⚡ LOW';
  th.style.color=near?'#a04040':med?'#a88040':'#608060';

  requestAnimationFrame(loop);
}

// ── MOVEMENT ──
function move(dx,dy){
  if(won||dead)return;
  const nx=player.x+dx,ny=player.y+dy;
  if(nx<0||ny<0||nx>=COLS||ny>=ROWS)return;
  const t=gt(nx,ny);
  if(!wk(t)&&!isDr(t)&&t!==EX)return;

  // Vent entrance to hidden lab
  if(t===VT){
    if(!secretFound){secretFound=true;sp(nx,ny,'rgba(100,180,140,0.5)',25,4);document.getElementById('msg').innerHTML='🔓 HIDDEN PASSAGE FOUND! Accessing classified area...';player.x=nx;player.y=ny;steps++;return}
    else{player.x=nx;player.y=ny;steps++;return}
  }

  if(isDr(t)){
    const cl=t===30?'y':t===31?'r':t===32?'b':'g';
    const lb=t===30?'CARGO':t===31?'MASTER':t===32?'LAB':'CLASSIFIED';
    if(doors[cl]){}
    else if(keys[cl]){
      doors[cl]=true;map[ny][nx]=C;sp(nx,ny,t===30?'#c8a030':t===31?'#984030':t===32?'#5080b0':'#40a060',30,5);
      document.getElementById('msg').innerHTML='🔓 '+lb+' DOOR UNLOCKED!';
      player.x=nx;player.y=ny;steps++;return;
    }else{document.getElementById('msg').innerHTML='🔒 Need '+lb+' card!';return}
  }

  if(t>=20&&t<=23){
    const cl=t===20?'y':t===21?'r':t===22?'b':'g';
    const lb=t===20?'CARGO':t===21?'MASTER':t===22?'LAB':'CLASSIFIED';
    const cc=t===20?'#c8a030':t===21?'#984030':t===22?'#5080b0':'#40a060';
    keys[cl]=true;map[ny][nx]=C;sp(nx,ny,cc,20,5);
    const kc=(keys.y?1:0)+(keys.r?1:0)+(keys.b?1:0)+(keys.g?1:0);
    document.getElementById('msg').innerHTML='🔑 '+lb+' CARD! ('+kc+'/4)';
  }

  if(t===EX){
    if(keys.y&&keys.r&&keys.b&&keys.g){won=true;sp(nx,ny,'#40a060',60,8);document.getElementById('msg').innerHTML='🎉 YOU ESCAPED! R to replay'}
    else{document.getElementById('msg').innerHTML='🚪 Find all 4 access cards!';return}
  }
  player.x=nx;player.y=ny;steps++;
}

// ── INPUT ──
document.addEventListener('keydown',e=>{
  if(e.key==='r'||e.key==='R'){reset();return}
  const k=e.key.toLowerCase();
  if(k==='w'||k==='arrowup'){e.preventDefault();move(0,-1)}
  if(k==='s'||k==='arrowdown'){e.preventDefault();move(0,1)}
  if(k==='a'||k==='arrowleft'){e.preventDefault();move(-1,0)}
  if(k==='d'||k==='arrowright'){e.preventDefault();move(1,0)}
});

function reset(){
  rmap();player={x:3,y:2};
  keys={y:false,r:false,b:false,g:false};doors={y:false,r:false,b:false,g:false};
  won=false;dead=false;steps=0;secretFound=false;
  particles=[];dust=[];shk=0;
  cam={x:0,y:0,tx:0,ty:0};sg();
  document.getElementById('msg').innerHTML='WASD to move • Explore the abandoned station • Find 4 access cards • Discover the hidden lab • ESCAPE';
}

rmap();sg();loop();
</script>
