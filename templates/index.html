];

    x:p[0].x,y:p[0].y,path:p,pi:0,pr:Math.random(),
    sp:0.012+i*0.003,chaseSp:0.028+i*0.005,
    state:'patrol',facing:0,alertTimer:0,searchTimer:0,

// Guard AI update
function updateGuardAI(g){
  const dx=player.x-g.x,dy=player.y-g.y;
  const dist=Math.sqrt(dx*dx+dy*dy);
  const angleToPlayer=Math.atan2(dy,dx);

  // Update facing based on movement direction
  if(g.state==='patrol'){
    const c=g.path[g.pi],n=g.path[(g.pi+1)%g.path.length];
    g.facing=Math.atan2(n.y-c.y,n.x-c.x);
  }

  // Vision check - can guard see player?
  const angleDiff=Math.abs(((angleToPlayer-g.facing)+Math.PI*3)%(Math.PI*2)-Math.PI);
  const inVision=dist<g.visRange&&angleDiff<g.visAngle/2;
  const blocked=isLineBlocked(g.x,g.y,player.x,player.y);

  switch(g.state){
    case'patrol':
      g.pr+=g.sp;
      if(g.pr>=1){g.pr-=1;g.pi=(g.pi+1)%g.path.length}
      const c2=g.path[g.pi],n2=g.path[(g.pi+1)%g.path.length];
      g.x=c2.x+(n2.x-c2.x)*g.pr;g.y=c2.y+(n2.y-c2.y)*g.pr;
      if(inVision&&!blocked){g.state='suspicious';g.alertTimer=60;g.lastKnown={x:player.x,y:player.y}}
      break;

    case'suspicious':
      g.alertTimer--;
      // Turn toward last known position
      g.facing=Math.atan2(g.lastKnown.y-g.y,g.lastKnown.x-g.x);
      if(inVision&&!blocked){g.state='alert';g.alertTimer=30}
      else if(g.alertTimer<=0){g.state='patrol'}
      break;

    case'alert':
      g.alertTimer--;
      g.facing=angleToPlayer;
      if(inVision&&!blocked&&g.alertTimer<=0){g.state='chase';g.lastKnown={x:player.x,y:player.y}}
      else if(g.alertTimer<=0){g.state='search';g.searchTimer=120}
      break;

    case'chase':
      g.lastKnown={x:player.x,y:player.y};
      g.facing=angleToPlayer;
      if(inVision&&!blocked){
        // Move toward player
        const cdx=dx/dist,cdy=dy/dist;
        g.x+=cdx*g.chaseSp;g.y+=cdy*g.chaseSp;
        // Don't walk through walls
        if(!wk(gt(Math.round(g.x),Math.round(g.y)))&&!isDr(gt(Math.round(g.x),Math.round(g.y)))){g.x-=cdx*g.chaseSp;g.y-=cdy*g.chaseSp}
      }else{
        // Lost sight - search
        g.state='search';g.searchTimer=150;
      }
      break;

    case'search':
      g.searchTimer--;
      // Move toward last known position
      const sdx=g.lastKnown.x-g.x,sdy=g.lastKnown.y-g.y;
      const sdist=Math.sqrt(sdx*sdx+sdy*sdy);
      if(sdist>0.3){
        g.facing=Math.atan2(sdy,sdx);
        g.x+=(sdx/sdist)*g.chaseSp*0.7;g.y+=(sdy/sdist)*g.chaseSp*0.7;
      }
      if(inVision&&!blocked){g.state='chase'}
      else if(g.searchTimer<=0){g.state='patrol'}
      break;
  }
}

// Simple line-of-sight check
function isLineBlocked(x1,y1,x2,y2){
  const steps=Math.ceil(Math.sqrt((x2-x1)**2+(y2-y1)**2)*3);
  for(let i=0;i<=steps;i++){
    const t=i/steps;
    const cx=x1+(x2-x1)*t,cy=y1+(y2-y1)*t;
    const t2=gt(Math.round(cx),Math.round(cy));
    if(isWall(t2)&&t2!==FE&&t2!==PI&&t2!==WB&&t2!==WG)return true;
  }
  return false;
}

function rmap(){map=MAP.map(r=>[...r])}
function gt(x,y){return(x<0||y<0||x>=COLS||y>=ROWS)?WA:map[y][x]}
function room(px,py){
  if(py<=2)return'CARGO PLATFORM';if(py>=3&&py<=6&&px<=37)return'TRACK 1';
  if(py===7)return'CONCOURSE';if(py>=8&&py<=10&&px<=37)return'TRACK 2';
  if(py>=11&&py<=13&&px<=37)return'CONTAINER STORAGE';if(py===14)return'REAR PLATFORM';
  if(py>=15&&py<=18&&px>=24)return'TRACK 3';if(py>=19&&py<=21&&px<=23)return'CARGO HOLD';
  if(py>=22&&py<=24&&px<=23)return'MAINTENANCE BAY';
  if(py>=25&&py<=28&&px>=21)return'CLASSIFIED LAB';
  return'INDUSTRIAL ZONE';
}

// ═══════════════ PARTICLES ═══════════════
function sp(tx,ty,color,count,spd){for(let i=0;i<count;i++)particles.push({x:(tx+0.5)*TS,y:(ty+0.5)*TS,vx:(Math.random()-0.5)*(spd||4),vy:(Math.random()-0.5)*(spd||4),life:1,decay:0.015+Math.random()*0.04,color,size:1+Math.random()*2})}
function up(arr){for(let i=arr.length-1;i>=0;i--){const p=arr[i];p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;if(p.life<=0)arr.splice(i,1)}}
function dp(arr){for(const p of arr){ctx.globalAlpha=p.life*0.6;ctx.fillStyle=p.color;ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size)}ctx.globalAlpha=1}
function sd(){if(dust.length<70&&Math.random()<0.5)dust.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.1,vy:-0.015-Math.random()*0.1,life:1,decay:0.0006+Math.random()*0.0015,size:0.2+Math.random()*0.8})}
function sst(){if(steamParticles.length<20&&Math.random()<0.1)steamParticles.push({x:0,y:0,life:1,decay:0.01+Math.random()*0.02,size:2+Math.random()*4})}

// ═══════════════ UPDATE ═══════════════
function updateAll(){
  if(won||dead)return;
  // Update guard AI
  let anyAlert=false,anyChase=false;
  for(const g of guards){
    updateGuardAI(g);
    if(g.state==='alert'||g.state==='chase')anyAlert=true;
    if(g.state==='chase')anyChase=true;
  }
  alertLevel=anyChase?2:anyAlert?1:0;
  sd();sst();
}

function checkCollision(){
  for(const g of guards){
    const dx=player.x-g.x,dy=player.y-g.y;
    const r=g.ty==='elite'?0.75:0.55;
    if(Math.sqrt(dx*dx+dy*dy)<r){dead=true;sp(player.x,player.y,'#883030',50,7);shk=15;document.getElementById('msg').innerHTML='💀 CAUGHT! Press R to retry'}
  }
}

function uc(){
  cam.tx=(player.x+0.5)*TS-canvas.width/2;cam.ty=(player.y+0.5)*TS-canvas.height/2;

// ═══════════════ PLAYER WITH WALK ANIMATION ═══════════════
function drawPlayer(){
  const px=(player.x+0.5)*TS-cam.x,py=(player.y+0.5)*TS-cam.y;
  const s=TS*0.44;
  ctx.save();ctx.translate(px,py);

  // Walking bob
  const bob=player.isMoving?Math.sin(player.walkTimer*12)*1.5:0;

  ctx.fillStyle=P.DROPSHADOW;ctx.fillRect(-s*0.6,bob*0.5+2,s*1.2,s*0.25);

  // Body
  ctx.fillStyle='#705020';ctx.fillRect(-s*0.28,-s*0.2+bob,s*0.56,s*0.48);
  // Vest detail
  ctx.fillStyle='#604818';ctx.fillRect(-s*0.22,-s*0.08+bob,s*0.44,s*0.2);
  // Shoulders
  ctx.fillStyle='#705020';ctx.fillRect(-s*0.48,-s*0.12+bob,s*0.96,s*0.22);
  // Head
  ctx.fillStyle='#b89078';ctx.fillRect(-s*0.18,-s*0.54+bob,s*0.36,s*0.3);
  // Hair
  ctx.fillStyle='#241808';ctx.fillRect(-s*0.18,-s*0.54+bob,s*0.36,s*0.1);
  // Eyes (direction indicator)
  ctx.fillStyle='#fff';
  const ex=player.facing===2?0:player.facing===0?0:player.facing===3?-0.06:0.06;
  ctx.fillRect(ex-0.12,-s*0.44+bob,0.08,0.06);ctx.fillRect(ex+0.04,-s*0.44+bob,0.08,0.06);
  ctx.fillStyle='#1a1008';ctx.fillRect(ex-0.1,-s*0.43+bob,0.04,0.04);ctx.fillRect(ex+0.06,-s*0.43+bob,0.04,0.04);

  // Arms
  ctx.fillStyle='#705020';
  const armB=player.isMoving?Math.sin(player.walkTimer*12)*2:0;
  ctx.fillRect(-s*0.56,-s*0.04+bob+armB*0.5,s*0.14,s*0.32);
  ctx.fillRect(s*0.42,-s*0.04+bob-armB*0.5,s*0.14,s*0.32);

  // Legs (walking animation - alternate)
  ctx.fillStyle='#26221a';
  const legOff=player.isMoving?Math.sin(player.walkTimer*12)*3:0;
  ctx.fillRect(-s*0.18,s*0.26+bob+legOff,s*0.14,s*0.34);
  ctx.fillRect(s*0.04,s*0.26+bob-legOff,s*0.14,s*0.34);
  // Boots
  ctx.fillStyle='#100e08';
  ctx.fillRect(-s*0.22,s*0.56+bob+legOff,s*0.18,s*0.08);
  ctx.fillRect(s*0.04,s*0.56+bob-legOff,s*0.18,s*0.08);

  ctx.restore();
}

// ═══════════════ GUARD WITH STATE INDICATOR ═══════════════
function drawGuard(g){
  const gx=(g.x+0.5)*TS-cam.x,gy=(g.y+0.5)*TS-cam.y;
  const s=TS*0.46;

  // Draw vision cone
  if(g.state==='suspicious'||g.state==='alert'||g.state==='chase'||g.state==='search'){
    ctx.save();ctx.translate(gx,gy);
    const vclr=g.state==='chase'?P.VISION_ALERT:P.VISION;
    ctx.fillStyle=vclr;
    ctx.beginPath();ctx.moveTo(0,0);
    const va=g.visAngle/2,range=g.visRange*TS;
    ctx.arc(0,0,range,g.facing-va,g.facing+va);ctx.closePath();ctx.fill();
    // Border
    ctx.strokeStyle=g.state==='chase'?'rgba(255,60,20,0.2)':'rgba(255,180,60,0.12)';
    ctx.lineWidth=1;ctx.stroke();
    ctx.restore();
  }

  ctx.save();ctx.translate(gx,gy);
  ctx.fillStyle=P.DROPSHADOW;ctx.fillRect(-s*0.6,2,s*1.2,s*0.25);

  // Body
  ctx.fillStyle=g.ty==='elite'?'#141028':'#141830';
  ctx.fillRect(-s*0.3,-s*0.2,s*0.6,s*0.48);
  // Vest
  ctx.fillStyle=g.clr;ctx.fillRect(-s*0.24,-s*0.06,s*0.48,s*0.24);
  // Shoulders
  ctx.fillStyle='#101428';ctx.fillRect(-s*0.5,-s*0.12,s*1.0,s*0.2);
  // Head
  ctx.fillStyle='#a07860';ctx.fillRect(-s*0.18,-s*0.54,s*0.36,s*0.3);
  // Helmet
  ctx.fillStyle=g.clr;ctx.fillRect(-s*0.18,-s*0.54,s*0.36,s*0.1);
  // Eyes glow for elite
  if(g.ty==='elite'){ctx.fillStyle='rgba(255,30,10,0.6)';ctx.fillRect(-0.08,-s*0.46,0.04,0.04);ctx.fillRect(0.04,-s*0.46,0.04,0.04)}
  else{ctx.fillStyle='#1a1008';ctx.fillRect(-0.08,-s*0.46,0.04,0.04);ctx.fillRect(0.04,-s*0.46,0.04,0.04)}

  // Arms + gun
  ctx.fillStyle='#101428';ctx.fillRect(-s*0.56,-s*0.02,s*0.14,s*0.32);
  ctx.fillStyle=g.clr;ctx.fillRect(s*0.42,-s*0.02,s*0.52,s*0.1);
  ctx.fillStyle='#201c18';ctx.fillRect(s*0.62,-s*0.04,s*0.06,s*0.14);

  // Legs
  ctx.fillStyle='#101428';ctx.fillRect(-s*0.18,s*0.26,s*0.14,s*0.34);ctx.fillRect(s*0.04,s*0.26,s*0.14,s*0.34);
  ctx.restore();

  // State label
  if(g.state!=='patrol'){
    const lbl=g.state==='chase'?'!':g.state==='suspicious'?'?':'!!';
    const lclr=g.state==='chase'?'#f44':g.state==='suspicious'?'#fc0':'#f80';
    ctx.fillStyle=lclr;ctx.font='bold 10px monospace';ctx.textAlign='center';
    ctx.fillText(lbl,gx,gy-s*1.1);
  }
}

// ═══════════════ MAIN DRAW ═══════════════
function draw(){
  ctx.fillStyle='#040408';ctx.fillRect(0,0,canvas.width,canvas.height);

  const sc=Math.max(0,Math.floor(cam.x/TS)-1);
  const ec=Math.min(COLS,Math.ceil((cam.x+canvas.width)/TS)+1);
  const sr=Math.max(0,Math.floor(cam.y/TS)-2);
  const er=Math.min(ROWS,Math.ceil((cam.y+canvas.height)/TS)+2);

  // Floor and non-wall tiles
  for(let r=sr;r<er;r++)for(let c=sc;c<ec;c++){const t=map[r][c];if(!isWall(t)||t===FE||t===PI)rd(t,c*TS,r*TS,c,r)}
  // Wall tiles on top
  for(let r=sr;r<er;r++)for(let c=sc;c<ec;c++){const t=map[r][c];if(isWall(t)&&t!==FE&&t!==PI)rd(t,c*TS,r*TS,c,r)}

  dp(dust);
  if(!won&&!dead){for(const g of guards)drawGuard(g);drawPlayer()}
  dp(particles);

  // Alert vignette
  const alAlpha=alertLevel===2?0.15:alertLevel===1?0.05:0;
  if(alAlpha>0){ctx.fillStyle='rgba(255,30,10,'+alAlpha+')';ctx.fillRect(0,0,canvas.width,canvas.height)}

  // Flicker
  if(room(player.x,player.y)==='CLASSIFIED LAB'&&Math.sin(fc*0.08)>0.55)ctx.fillStyle='rgba(0,0,0,0.15)',ctx.fillRect(0,0,canvas.width,canvas.height);

  // Vignette
  const grd=ctx.createRadialGradient(canvas.width/2,canvas.height*0.35,canvas.width*0.3,canvas.width/2,canvas.height*0.35,canvas.width*0.9);
  grd.addColorStop(0,'rgba(0,0,0,0)');grd.addColorStop(1,'rgba(0,0,0,0.7)');
  ctx.fillStyle=grd;ctx.fillRect(0,0,canvas.width,canvas.height);

  // Screen shake
  if(shk>0.5){const sx=(Math.random()-0.5)*shk,sy=(Math.random()-0.5)*shk;const img=ctx.getImageData(0,0,canvas.width,canvas.height);ctx.fillStyle='#040408';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.putImageData(img,Math.round(sx),Math.round(sy))}

  if(won){
    ctx.fillStyle='rgba(0,0,0,0.85)';ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#60a070';ctx.font='bold 38px "Courier New",monospace';ctx.textAlign='center';
    ctx.fillText('FREEDOM',canvas.width/2,canvas.height/2-20);
    ctx.fillStyle='#8ab090';ctx.font='14px "Courier New",monospace';
    ctx.fillText('You escaped the abandoned station.',canvas.width/2,canvas.height/2+12);
  }
  if(dead){
    ctx.fillStyle='rgba(35,0,0,0.7)';ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#a04040';ctx.font='bold 32px "Courier New",monospace';ctx.textAlign='center';
    ctx.fillText('TERMINATED',canvas.width/2,canvas.height/2);
  }
  ctx.textAlign='start';
}

// ═══════════════ GAME LOOP ═══════════════
function loop(){
  fc++;
  if(!won&&!dead){updateAll();checkCollision();if(player.isMoving){player.walkTimer+=0.16}}
  uc();if(shk>0)shk*=0.85;
  up(particles);up(dust);up(steamParticles);draw();

  const kc=(keys.y?1:0)+(keys.r?1:0)+(keys.b?1:0)+(keys.g?1:0);
  document.getElementById('keys').textContent=kc+'/4';
  document.getElementById('roomName').textContent=room(player.x,player.y);
  document.getElementById('steps').textContent=steps;
  const sec=document.getElementById('secret');
  sec.textContent=secretFound?'🔓 CLASSIFIED':'🔒 ???';sec.style.color=secretFound?'#60a060':'#504030';

  const near=guards.some(g=>Math.sqrt((player.x-g.x)**2+(player.y-g.y)**2)<4);
  const th=document.getElementById('threat');
  th.textContent=alertLevel===2?'🚨 HUNTING':near?'⚠ HIGH':alertLevel===1?'👁 ALERT':'⚡ LOW';
  th.style.color=alertLevel===2?'#f44':near?'#f80':alertLevel===1?'#fc0':'#608060';

  requestAnimationFrame(loop);
}

// ═══════════════ MOVEMENT ═══════════════
function move(dx,dy){
  if(won||dead)return;
  const nx=player.x+dx,ny=player.y+dy;
  if(nx<0||ny<0||nx>=COLS||ny>=ROWS)return;
  const t=gt(nx,ny);
  if(!wk(t)&&!isDr(t)&&t!==EX)return;

  player.isMoving=true;
  if(dx!==0)player.facing=dx>0?2:3;
  if(dy!==0)player.facing=dy>0?0:1;

  if(t===VT){if(!secretFound){secretFound=true;sp(nx,ny,'rgba(80,160,120,0.4)',25,4);document.getElementById('msg').innerHTML='🔓 HIDDEN PASSAGE! Classified area...'}player.x=nx;player.y=ny;steps++;return}
  if(isDr(t)){
    const cl=t===30?'y':t===31?'r':t===32?'b':'g';
    const lb=t===30?'CARGO':t===31?'MASTER':t===32?'LAB':'CLASSIFIED';
    if(doors[cl]){}
    else if(keys[cl]){doors[cl]=true;map[ny][nx]=C;sp(nx,ny,t===30?'#c8a030':t===31?'#984030':t===32?'#5080b0':'#40a060',30,5);document.getElementById('msg').innerHTML='🔓 '+lb+' DOOR UNLOCKED!';player.x=nx;player.y=ny;steps++;return}
    else{document.getElementById('msg').innerHTML='🔒 Need '+lb+' card!';return}
  }
  if(t>=20&&t<=23){const cl=t===20?'y':t===21?'r':t===22?'b':'g',lb=t===20?'CARGO':t===21?'MASTER':t===22?'LAB':'CLASSIFIED',cc=t===20?'#c8a030':t===21?'#984030':t===22?'#5080b0':'#40a060';keys[cl]=true;map[ny][nx]=C;sp(nx,ny,cc,20,5);const kc=(keys.y?1:0)+(keys.r?1:0)+(keys.b?1:0)+(keys.g?1:0);document.getElementById('msg').innerHTML='🔑 '+lb+' CARD! ('+kc+'/4)'}
  if(t===EX){if(keys.y&&keys.r&&keys.b&&keys.g){won=true;sp(nx,ny,'#40a060',60,8)}else{document.getElementById('msg').innerHTML='🚪 Find all 4 access cards!';return}}
  player.x=nx;player.y=ny;steps++;
}

// ═══════════════ INPUT ═══════════════
const keysDown={};
document.addEventListener('keydown',e=>{
  if(e.key==='r'||e.key==='R'){reset();return}
  keysDown[e.key.toLowerCase()]=true;
});
document.addEventListener('keyup',e=>{keysDown[e.key.toLowerCase()]=false});

function processInput(){
  if(won||dead){player.isMoving=false;return}
  const k=keysDown;
  let mx=0,my=0;
  if(k['w']||k['arrowup'])my=-1;
  if(k['s']||k['arrowdown'])my=1;
  if(k['a']||k['arrowleft'])mx=-1;
  if(k['d']||k['arrowright'])mx=1;

  if(mx!==0||my!==0){
    if(mx!==0&&my!==0){mx*=0.707;my*=0.707}
    move(mx,my);
  }else{
    player.isMoving=false;
    if(!player.isMoving)player.walkTimer=0;
  }
}

function reset(){
  rmap();player={x:3,y:2,facing:2,frame:0,walkTimer:0,isMoving:false};
  keys={y:false,r:false,b:false,g:false};doors={y:false,r:false,b:false,g:false};
  won=false;dead=false;steps=0;secretFound=false;alertLevel=0;
  particles=[];dust=[];steamParticles=[];shk=0;
  cam={x:0,y:0,tx:0,ty:0};sg();
  document.getElementById('msg').innerHTML='WASD to move • Find 4 keycards • Discover hidden lab • ESCAPE';
}

// Override loop to include input processing
const _origLoop=loop;
loop=function(){
  processInput();
  _origLoop();
};

rmap();sg();loop();
</script>
