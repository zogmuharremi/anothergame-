// AI update
function updateTerm(g){
  const dx=player.x-g.x,dy=player.y-g.y,dist=Math.sqrt(dx*dx+dy*dy),ang=Math.atan2(dy,dx);
  if(g.state==='patrol'){const c=g.path[g.pi],n=g.path[(g.pi+1)%g.path.length];g.facing=Math.atan2(n.y-c.y,n.x-c.x)}
  const ad=Math.abs(((ang-g.facing)+Math.PI*3)%(Math.PI*2)-Math.PI),inVis=dist<g.visRange&&ad<g.visAngle/2,blocked=isBlocked(g.x,g.y,player.x,player.y);
  switch(g.state){
    case'patrol':g.pr+=g.sp;if(g.pr>=1){g.pr-=1;g.pi=(g.pi+1)%g.path.length}const c=g.path[g.pi],n=g.path[(g.pi+1)%g.path.length];g.x=c.x+(n.x-c.x)*g.pr;g.y=c.y+(n.y-c.y)*g.pr;if(inVis&&!blocked){g.state='chase';g.timer=0}break;
    case'chase':if(inVis&&!blocked){const mx=dx/dist,my=dy/dist;g.x+=mx*g.chaseSp;g.y+=my*g.chaseSp;if(!wk(gt(Math.round(g.x),Math.round(g.y)))&&!isD(gt(Math.round(g.x),Math.round(g.y)))){g.x-=mx*g.chaseSp;g.y-=my*g.chaseSp}}else{g.timer++;if(g.timer>150)g.state='patrol'}break;
  }
}

  if(g.state==='chase'){X.save();X.translate(gx,gy);X.fillStyle='rgba(255,20,10,0.04)';X.beginPath();X.moveTo(0,0);X.arc(0,0,g.visRange*TS,g.facing-g.visAngle/2,g.facing+g.visAngle/2);X.closePath();X.fill();X.restore()}
  X.save();X.translate(gx,gy);
  X.fillStyle='rgba(0,0,0,0.3)';X.fillRect(-s*0.5,1.5,s*1,s*0.2);
  // Metallic body
  X.fillStyle=P.TERMINATOR_BODY;X.fillRect(-s*0.32,-s*0.18,s*0.64,s*0.42);
  X.fillStyle='#282828';X.fillRect(-s*0.26,-s*0.04,s*0.52,s*0.2);
  X.fillStyle='#1a1a1a';X.fillRect(-s*0.44,-s*0.08,s*0.88,s*0.16);
  // Head - mechanical
  X.fillStyle='#202020';X.fillRect(-s*0.16,-s*0.48,s*0.32,s*0.26);
  // Red eyes
  X.fillStyle=P.TERMINATOR_EYE;X.fillRect(-0.06,-s*0.4,0.04,0.04);X.fillRect(0.02,-s*0.4,0.04,0.04);
  X.fillStyle='rgba(255,30,10,0.3)';X.fillRect(-0.07,-s*0.41,0.06,0.06);X.fillRect(0.01,-s*0.41,0.06,0.06);
  // Arms
  X.fillStyle='#1a1a1a';X.fillRect(-s*0.5,-s*0.02,s*0.12,s*0.24);X.fillRect(s*0.38,-s*0.02,s*0.12,s*0.24);
  // Legs
  X.fillStyle='#1a1a1a';X.fillRect(-s*0.16,s*0.22,s*0.12,s*0.28);X.fillRect(s*0.04,s*0.22,s*0.12,s*0.28);
  X.restore();
  if(g.state==='chase'){X.fillStyle='#f44';X.font='bold 7px monospace';X.textAlign='center';X.fillText('!',gx,gy-s*1.1)}
}

// ═══════════ SCIENTIST ═══════════
function drawScientist(g){
  const gx=(g.x+0.5)*TS-cam.x,gy=(g.y+0.5)*TS-cam.y,s=TS*0.4;
  if(g.state==='chase'){X.save();X.translate(gx,gy);X.fillStyle=P.LIGHT_GREEN;X.beginPath();X.moveTo(0,0);X.arc(0,0,g.visRange*TS,g.facing-g.visAngle/2,g.facing+g.visAngle/2);X.closePath();X.fill();X.restore()}
  X.save();X.translate(gx,gy);
  X.fillStyle='rgba(0,0,0,0.25)';X.fillRect(-s*0.45,1.5,s*0.9,s*0.18);
  // Lab coat
  X.fillStyle=P.SCIENTIST_COAT;X.fillRect(-s*0.24,-s*0.16,s*0.48,s*0.38);
  X.fillStyle='#b0b0a8';X.fillRect(-s*0.18,-s*0.02,s*0.36,s*0.14);
  X.fillStyle=P.SCIENTIST_COAT;X.fillRect(-s*0.4,-s*0.06,s*0.8,s*0.16);
  X.fillStyle='#a08068';X.fillRect(-s*0.12,-s*0.46,s*0.24,s*0.24);
  X.fillStyle='#1a1008';X.fillRect(-s*0.12,-s*0.46,s*0.24,s*0.06);
  // Glasses
  X.fillStyle='#000';X.fillRect(-0.06,-s*0.38,0.04,0.04);X.fillRect(0.02,-s*0.38,0.04,0.04);
  X.fillStyle=P.SCIENTIST_COAT;X.fillRect(-s*0.44,-s*0.02,s*0.1,s*0.2);X.fillRect(s*0.34,-s*0.02,s*0.1,s*0.2);
  X.fillStyle='#1a1814';X.fillRect(-s*0.12,s*0.22,s*0.1,s*0.22);X.fillRect(s*0.02,s*0.22,s*0.1,s*0.22);
  X.restore();
}

// ═══════════ MAIN DRAW ═══════════
function draw(){
  X.fillStyle='#020204';X.fillRect(0,0,C.width,C.height);
  const sc=Math.max(0,Math.floor(cam.x/TS)-1),ec=Math.min(COLS,Math.ceil((cam.x+C.width)/TS)+1);
  const sr=Math.max(0,Math.floor(cam.y/TS)-2),er=Math.min(ROWS,Math.ceil((cam.y+C.height)/TS)+2);
  for(let r=sr;r<er;r++)for(let c=sc;c<ec;c++)if(map[r]){const t=map[r][c];if(!isW(t)||t===Ba||t===Gl)rd(t,c*TS,r*TS,c,r)}
  for(let r=sr;r<er;r++)for(let c=sc;c<ec;c++)if(map[r]){const t=map[r][c];if(isW(t)&&t!==Ba&&t!==Gl)rd(t,c*TS,r*TS,c,r)}
  dp(dust);
  // Light beams from lamps
  for(let r=sr;r<er;r++)for(let c=sc;c<ec;c++)if(map[r]){const t=map[r][c];if(t===Lm||t===Lp){const sx=c*TS-cam.x+TS/2,sy=r*TS-cam.y+TS/2,al=t===Lp?(Math.sin(fc*0.12+c*3)*0.2+0.3)*0.008:0.006;X.fillStyle='rgba(200,160,100,'+al+')';X.beginPath();X.moveTo(sx,sy);X.lineTo(sx-20,sy+40);X.lineTo(sx-12,sy+40);X.closePath();X.fill();X.beginPath();X.moveTo(sx,sy);X.lineTo(sx+20,sy+40);X.lineTo(sx+12,sy+40);X.closePath();X.fill()}}
  for(const g of terminators)drawTerminator(g);
  for(const g of scientists)drawScientist(g);
  if(!captured)drawPlayer();
  dp(particles);

  // Alarm overlay
  if(alarmOn){ALARM.style.display='block';ALARM.style.background='rgba(255,0,0,'+(0.02+Math.sin(fc*0.2)*0.02)+')'}else ALARM.style.display='none';

  // Capture overlay
  if(captured){X.fillStyle='rgba(0,0,0,0.5)';X.fillRect(0,0,C.width,C.height);X.fillStyle='#f44';X.font='bold 22px monospace';X.textAlign='center';
    if(captureType==='terminator'){X.fillText('CAPTURED BY TERMINATOR',C.width/2,C.height/2-20);X.fillStyle='#fc0';X.font='14px monospace';X.fillText('PRESS SPACE RAPIDLY TO ESCAPE',C.width/2,C.height/2+10);X.fillText('HP: '+playerHP,C.width/2,C.height/2+30)}
    else{X.fillText('EXPERIMENT IN PROGRESS',C.width/2,C.height/2-20);X.fillStyle='#f80';X.font='14px monospace';X.fillText('PRESS SPACE TO BREAK FREE',C.width/2,C.height/2+10);X.fillStyle='#f44';X.fillText('HP DRAINING: '+playerHP,C.width/2,C.height/2+30)}
  }

  // Vignette
  const gd=X.createRadialGradient(C.width/2,C.height*0.25,C.width*0.2,C.width/2,C.height*0.25,C.width*0.95);
  gd.addColorStop(0,'rgba(0,0,0,0)');gd.addColorStop(1,'rgba(0,0,0,0.8)');X.fillStyle=gd;X.fillRect(0,0,C.width,C.height);

  if(won){X.fillStyle='rgba(0,0,0,0.9)';X.fillRect(0,0,C.width,C.height);X.fillStyle='#60a070';X.font='bold 32px monospace';X.textAlign='center';X.fillText('FREEDOM',C.width/2,C.height/2-12)}
  if(dead){X.fillStyle='rgba(20,0,0,0.8)';X.fillRect(0,0,C.width,C.height);X.fillStyle='#a04040';X.font='bold 26px monospace';X.textAlign='center';X.fillText('TERMINATED',C.width/2,C.height/2)}

  // Intro sequence
  if(gameState==='intro'){
    X.fillStyle='rgba(0,0,0,'+(1-introTimer/120)+')';X.fillRect(0,0,C.width,C.height);
    if(introPhase===0){
      X.fillStyle='#ccc';X.font='14px monospace';X.textAlign='center';X.fillText('FACILITY 7349',C.width/2,C.height/2-30);
      X.fillStyle='#888';X.font='10px monospace';X.fillText('PRISONER #7349 - HOLDING CELL 3',C.width/2,C.height/2);
    }else if(introPhase===1){
      X.fillStyle='#f44';X.font='16px monospace';X.textAlign='center';X.fillText('⚠ BREAKOUT ⚠',C.width/2,C.height/2-10);
      X.fillStyle='#fc0';X.font='10px monospace';X.fillText('FIND 4 KEYCARDS - AVOID CAPTURE - ESCAPE',C.width/2,C.height/2+10);
    }
  }
  X.textAlign='start';
}

// ═══════════ GAME LOOP ═══════════
function loop(){
  fc++;
  if(gameState==='intro'){
    introTimer++;
    if(introTimer>120&&introPhase===0){introPhase=1;introTimer=0}
    if(introTimer>90&&introPhase===1){gameState='playing';alarmOn=true;alarmTimer=300;spawnTerminators();spawnScientists();document.getElementById('msg').innerHTML='⚠ ALARM ACTIVE — ESCAPE!'}
    if(gameState==='intro'){uc();draw();requestAnimationFrame(loop);return}
  }

  if(alarmOn){alarmTimer--;if(alarmTimer<=0)alarmOn=false}

  if(!won&&!dead&&!captured){
    for(const g of terminators)updateTerm(g);
    for(const g of scientists)updateSci(g);
    checkCaptures();
    sd();
    if(player.isMoving)player.walkTimer+=0.13;
  }
  if(captured){captureTimer--;if(captureTimer<=0){captured=false;sp(player.x,player.y,'#ff0',20,5);document.getElementById('msg').innerHTML='FREED! Keep running...';document.getElementById('status').textContent='AWAKE'}}
  uc();if(shk>0)shk*=0.8;up(particles);up(dust);draw();

  const kc=(keys.y?1:0)+(keys.r?1:0)+(keys.b?1:0)+(keys.g?1:0);
  document.getElementById('keys').textContent=kc+'/4';
  document.getElementById('roomName').textContent=room(player.x,player.y);
  document.getElementById('hp').textContent=playerHP;
  document.getElementById('status').textContent=captured?(captureType==='terminator'?'CAPTURED':'EXPERIMENT'):(alarmOn?'⚠ ALARM':'AWAKE');
  requestAnimationFrame(loop);
}

function checkCaptures(){
  for(const g of terminators){
    const d=Math.sqrt((player.x-g.x)**2+(player.y-g.y)**2);
    if(d<0.5){captureByTerminator(g);return}
  }
  for(const g of scientists){
    const d=Math.sqrt((player.x-g.x)**2+(player.y-g.y)**2);
    if(d<0.45){captureByScientist(g);return}
  }
}
function captureByTerminator(g){
  captured=true;captureType='terminator';captureTimer=150;
  playerHP--;shk=12;
  // Teleport to containment
  player.x=6+Math.random()*15;player.y=21+Math.random()*2;
  g.state='patrol';g.timer=0;
  sp(player.x,player.y,'#ff2020',30,6);
  document.getElementById('status').textContent='CAPTURED';
  document.getElementById('msg').innerHTML='💀 TERMINATOR CAPTURE! PRESS SPACE!';
  if(playerHP<=0){dead=true;document.getElementById('msg').innerHTML='☠ TERMINATED'}
}
function captureByScientist(g){
  captured=true;captureType='scientist';captureTimer=120;
  playerHP--;shk=8;
  player.x=10+Math.random()*30;player.y=16+Math.random()*3;
  g.state='patrol';g.timer=0;
  sp(player.x,player.y,'#40ff40',20,5);
  document.getElementById('status').textContent='EXPERIMENT';
  document.getElementById('msg').innerHTML='🧪 SCIENTIST CAPTURE! PRESS SPACE!';
  if(playerHP<=0){dead=true;document.getElementById('msg').innerHTML='☠ EXPERIMENT TERMINAL'}
}

// ═══════════ MOVEMENT ═══════════
function move(dx,dy){
  if(won||dead||captured)return;
  const nx=player.x+dx,ny=player.y+dy;
  if(nx<0||ny<0||nx>=COLS||ny>=ROWS)return;
  const t=gt(nx,ny);
  if(!wk(t)&&!isD(t)&&t!==Ex)return;
  player.isMoving=true;if(dx!==0)player.facing=dx>0?2:3;if(dy!==0)player.facing=dy>0?0:1;
  if(isD(t)){
    const cl=t===18?'y':t===19?'r':t===20?'b':'g',lb=t===18?'CARGO':t===19?'MASTER':t===20?'LAB':'VAULT';
    if(doors[cl]){}
    else if(keys[cl]){doors[cl]=true;map[ny][nx]=Cc;sp(nx,ny,t===18?'#d4a830':t===19?'#b84030':t===20?'#5088c0':'#40a860',30,5);document.getElementById('msg').innerHTML='🔓 '+lb+' DOOR!';player.x=nx;player.y=ny;steps++;return}
    else{document.getElementById('msg').innerHTML='🔒 Need '+lb+' card!';return}
  }
  if(t>=22&&t<=25){const cl=t===22?'y':t===23?'r':t===24?'b':'g',lb=t===22?'CARGO':t===23?'MASTER':t===24?'LAB':'VAULT',cc=t===22?'#d4a830':t===23?'#b84030':t===24?'#5088c0':'#40a860';keys[cl]=true;map[ny][nx]=Cc;sp(nx,ny,cc,20,5);const kc=(keys.y?1:0)+(keys.r?1:0)+(keys.b?1:0)+(keys.g?1:0);document.getElementById('msg').innerHTML='🔑 '+lb+' CARD! ('+kc+'/4)'}
  if(t===Ex){if(keys.y&&keys.r&&keys.b&&keys.g){won=true;sp(nx,ny,'#40a060',60,8)}else{document.getElementById('msg').innerHTML='🚪 Need all 4 keycards!';return}}
  if(t===Vt){player.x=nx;player.y=ny;steps++;return}
  player.x=nx;player.y=ny;steps++;
}

// ═══════════ INPUT ═══════════
const kd={};
let spaceMash=0;
document.addEventListener('keydown',e=>{
  if(e.key==='r'||e.key==='R'){reset();return}
  kd[e.key.toLowerCase()]=true;
  if(e.key===' '&&captured){spaceMash++;if(spaceMash>25){captured=false;spaceMash=0;sp(player.x,player.y,'#ffff40',25,6);document.getElementById('msg').innerHTML='FREED!';document.getElementById('status').textContent='AWAKE'}}
});
document.addEventListener('keyup',e=>{kd[e.key.toLowerCase()]=false;if(e.key===' ')spaceMash=Math.max(0,spaceMash-2)});

function processInput(){
  if(won||dead||captured){player.isMoving=false;return}
  let mx=0,my=0;
  if(kd['w']||kd['arrowup'])my=-1;if(kd['s']||kd['arrowdown'])my=1;
  if(kd['a']||kd['arrowleft'])mx=-1;if(kd['d']||kd['arrowright'])mx=1;
  if(mx&&my){mx*=0.707;my*=0.707}
  if(mx!==0||my!==0)move(mx,my);else{player.isMoving=false;player.walkTimer=0}
}

function reset(){
  rmap();player={x:3,y:1,facing:2,walkTimer:0,isMoving:false};
  keys={y:false,r:false,b:false,g:false};doors={y:false,r:false,b:false,g:false};
  won=false;dead=false;playerHP=3;steps=0;captured=false;captureType=null;captureTimer=0;spaceMash=0;
  terminators=[];scientists=[];particles=[];dust=[];shk=0;alarmOn=false;alarmTimer=0;
  cam={x:0,y:0,tx:0,ty:0};
  gameState='intro';introTimer=0;introPhase=0;
  document.getElementById('msg').innerHTML='BREAKING OUT...';
  document.getElementById('status').textContent='CONTAINED';
  document.getElementById('prisoner').textContent='#7349';
}

const _L=loop;loop=function(){processInput();_L()};
rmap();loop();
</script></body></html>
